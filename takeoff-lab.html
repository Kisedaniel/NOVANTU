<title>NOVANTU · Take-off Lab</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
    --bg:#f5f2ea; --bg1:#efece2; --bg2:#e7e3d6; --bg3:#dfdacb;
    --ink-950:#181613; --ink-900:#232019; --ink-700:#4a453a;
    --bone-50:#faf8f2; --text:#2c2820; --text2:#5c564a; --text3:#8a857a;
    --border:#d8d2c2; --rule:#c9c2b0;
    --amber:#b8860b; --amber-bg:#f5edd8; --amber-border:#d9c48a;
    --red:#c44a2c; --red-bg:#f7e6e0; --red-border:#e0b3a4;
    --green:#4a7c59; --green-bg:#e4eee7;
    --mono:'SF Mono','Cascadia Code',Consolas,monospace;
    --sans:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --r:4px; --r2:8px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px}
  .kicker{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);font-weight:600}
  .btn{display:inline-flex;align-items:center;gap:7px;border-radius:var(--r2);padding:9px 16px;font-family:var(--mono);font-size:11.5px;font-weight:600;letter-spacing:.04em;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--ink-900)}
  .btn:disabled{opacity:.5;cursor:wait}
  .btn-amber{background:var(--amber);border-color:var(--amber);color:var(--bone-50)}
  .btn-ink{background:var(--ink-950);border-color:var(--ink-950);color:var(--bone-50)}
  .btn-sm{padding:5px 10px;font-size:10.5px}
  .btn-red{color:var(--red);border-color:var(--red-border)}
  .card{background:var(--bone-50);border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px}
  .minp{border:1px solid var(--border);border-radius:var(--r);padding:6px 8px;font-family:var(--mono);font-size:11.5px;background:#fff;color:var(--text);outline:none}
  .minp:focus{border-color:var(--amber)}
  textarea.minp{font-family:var(--sans);font-size:12.5px}
  .spin{display:inline-block;width:11px;height:11px;border:2px solid var(--text3);border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-1px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .chip{display:inline-block;font-family:var(--mono);font-size:8.5px;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:9px;border:1px solid var(--border);background:var(--bg1);color:var(--text2)}
  .backdrop{position:fixed;inset:0;background:rgba(24,22,19,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal{background:var(--bone-50);border:1px solid var(--rule);border-radius:10px;padding:20px 22px;max-height:92vh;overflow-y:auto;width:100%}
  table.sheet{width:100%;border-collapse:collapse;font-size:11.5px}
  table.sheet th{text-align:left;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:7px 8px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg1);z-index:1}
  table.sheet td{padding:3px 6px;border-bottom:1px solid var(--border)}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:5px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';
/* ============================================================
   NOVANTU TAKE-OFF LAB — standalone experimental tool.
   Upload a plan set → a pipeline of three AI agents quantifies it:
     Agent 1 · Sheet classifier  — what is each page (assembly / RCP /
                                    finish plan / spec table / elevations)
     Agent 2 · Take-off extractor — quantities per level·space·material,
                                    with rectangle marks on the pages
     Agent 3 · Checker (optional) — re-reads the sheets vs the numbers
   Output: an editable sheet with live totals by material & level,
   Excel/CSV export, and MARKED-UP plan pages (color per material + SF
   labels) you can download as images — like a hand-highlighted take-off.
   AI calls go through NOVANTU's existing ask-ai edge function.
   ============================================================ */

if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

const SUPABASE_URL = 'https://gvpsxsqloeklghcaxudg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2cHN4c3Fsb2VrbGdoY2F4dWRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MjM1ODcsImV4cCI6MjA5NTE5OTU4N30.KyhbD-ZEg-OG9PXAKlodBQRqgLK1_P_AkQMtJptp_VI';
const MAX_IMAGES = 25;          // server-side cap in ask-ai
const FULL_W = 1500;            // extraction render width (text must be legible)
const CLS_W = 900;              // classification render width
const THUMB_W = 230;

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  projectName: '',
  pages: [],          // [{doc, num, name, thumb, cls:{type,level,sheet,note}|null, canvas? }]
  loading: false,
  classifying: false,
  extracting: false,
  verifying: false,
  preset: 'walls',
  guidance: '',
  takeoff: null,      // active {id, ts, preset, label, rows[], missing[], notes, issues[]}
  saved: [],          // localStorage — sheets survive, marks need the same PDF re-uploaded
  runLog: [],
  viewer: null,       // {idx}
  sheetOpen: false,
};
try { S.saved = JSON.parse(localStorage.getItem('nvto_saved') || '[]'); } catch (_e) { S.saved = []; }
function persist() { try { localStorage.setItem('nvto_saved', JSON.stringify(S.saved.slice(-30))); } catch (_e) {} }

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) { return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
function fmtNum(n) { return (Math.round(Number(n) * 100) / 100).toLocaleString(); }
function log(msg, cls) { S.runLog.push({ ts: new Date().toLocaleTimeString(), msg, cls: cls || '' }); render(); const el = document.getElementById('runlog'); if (el) el.scrollTop = el.scrollHeight; }

// Color per material — known construction tags first, stable hash otherwise.
const MAT_PALETTE = ['#2563eb', '#0891b2', '#7c3aed', '#c2410c', '#15803d', '#be185d', '#a16207', '#0f766e', '#dc2626', '#4d7c0f'];
function matColor(mat) {
  const m = String(mat || '').toUpperCase();
  if (/^PL|PLASTER|STUCCO/.test(m)) return '#2563eb';   // blue — like the assembly legend
  if (/^GYP|W-2|GYPSUM/.test(m)) return '#0891b2';      // cyan
  if (/^TL|TILE/.test(m)) return '#7c3aed';             // purple
  if (/^ST|STONE/.test(m)) return '#dc2626';            // red
  if (/^CT/.test(m)) return '#c2410c';                  // orange — countertops
  if (/^FF|FLOOR/.test(m)) return '#15803d';            // green
  if (/^WD|WOOD|WP/.test(m)) return '#4d7c0f';
  if (/^MTL|METAL/.test(m)) return '#be185d';
  let h = 0; for (let i = 0; i < m.length; i++) h = (h * 31 + m.charCodeAt(i)) >>> 0;
  return MAT_PALETTE[h % MAT_PALETTE.length];
}

// ── PDF loading ───────────────────────────────────────────────────────────────
async function handleFiles(files) {
  const list = Array.from(files || []).filter(f => /pdf$/i.test(f.name));
  if (!list.length) return;
  S.loading = true; render();
  try {
    for (const f of list) {
      const buf = await f.arrayBuffer();
      const doc = await pdfjsLib.getDocument({ data: buf }).promise;
      if (!S.projectName) S.projectName = f.name.replace(/\.pdf$/i, '');
      for (let n = 1; n <= doc.numPages; n++) {
        const page = await doc.getPage(n);
        const vp1 = page.getViewport({ scale: 1 });
        const mk = async (w, q) => {
          const scale = w / vp1.width;
          const vp = page.getViewport({ scale });
          const cv = document.createElement('canvas');
          cv.width = Math.round(vp.width); cv.height = Math.round(vp.height);
          await page.render({ canvasContext: cv.getContext('2d'), viewport: vp }).promise;
          return cv.toDataURL('image/jpeg', q);
        };
        S.pages.push({
          name: f.name, num: n,
          thumb: await mk(THUMB_W, 0.6),
          cls: null,
        });
        // full/cls renders are made lazily (RAM) — keep the page handle
        S.pages[S.pages.length - 1]._page = page;
        render();
      }
      log(`Loaded ${f.name} — ${doc.numPages} page(s).`);
    }
  } catch (e) {
    log('PDF load failed: ' + (e.message || e), 'err');
  } finally {
    S.loading = false; render();
  }
}
async function renderPageImage(p, width, q) {
  const page = p._page;
  const vp1 = page.getViewport({ scale: 1 });
  const vp = page.getViewport({ scale: width / vp1.width });
  const cv = document.createElement('canvas');
  cv.width = Math.round(vp.width); cv.height = Math.round(vp.height);
  await page.render({ canvasContext: cv.getContext('2d'), viewport: vp }).promise;
  return cv;
}

// ── Tiling — THE fix for illegible sheets ────────────────────────────────────
// Vision models downscale every image to ~1.5k px on the long edge, so a whole
// 36"×24" sheet can never carry legible room tags or dimensions. Each sheet is
// sent as an OVERVIEW (for layout + marks) plus a grid of HIGH-RES TILES
// (default 3×3 with overlap → ~2.5× effective zoom), each tile at the model's
// resolution sweet spot.
const OVERVIEW_W = 1100;
const TILE_LONG = 1500;
async function tileImagesFor(p, grid) {
  const g = grid || 3;
  const overlap = 0.08;
  const srcW = Math.min(4400, Math.round(TILE_LONG * g / (1 + 2 * overlap)));
  const cv = await renderPageImage(p, srcW);
  const imgs = [];
  const ov = document.createElement('canvas');
  const os = OVERVIEW_W / cv.width;
  ov.width = OVERVIEW_W; ov.height = Math.round(cv.height * os);
  ov.getContext('2d').drawImage(cv, 0, 0, ov.width, ov.height);
  imgs.push({ label: 'FULL PAGE overview — marks reference THIS image', url: ov.toDataURL('image/jpeg', 0.78) });
  const stepX = cv.width / g, stepY = cv.height / g;
  const padX = stepX * overlap, padY = stepY * overlap;
  const rowName = ['TOP', 'MIDDLE', 'BOTTOM'], colName = ['LEFT', 'CENTER', 'RIGHT'];
  for (let r = 0; r < g; r++) for (let c = 0; c < g; c++) {
    const x0 = Math.max(0, c * stepX - padX), y0 = Math.max(0, r * stepY - padY);
    const x1 = Math.min(cv.width, (c + 1) * stepX + padX), y1 = Math.min(cv.height, (r + 1) * stepY + padY);
    const w = x1 - x0, h = y1 - y0;
    const scale = Math.min(1, TILE_LONG / Math.max(w, h));
    const t = document.createElement('canvas');
    t.width = Math.round(w * scale); t.height = Math.round(h * scale);
    t.getContext('2d').drawImage(cv, x0, y0, w, h, 0, 0, t.width, t.height);
    const nm = g === 3 ? `${rowName[r]}-${colName[c]}` : `r${r + 1}c${c + 1}`;
    imgs.push({ label: `${nm} zoom tile of the SAME page`, url: t.toDataURL('image/jpeg', 0.8) });
  }
  return imgs;
}
// Title-block strip (right edge, where sheet number + title + level live) at
// readable zoom — used by the classifier.
async function titleStripFor(p) {
  const cv = await renderPageImage(p, 3000);
  const sw = Math.round(cv.width * 0.26);
  const strip = document.createElement('canvas');
  const scale = Math.min(1, TILE_LONG / cv.height);
  strip.width = Math.round(sw * scale); strip.height = Math.round(cv.height * scale);
  strip.getContext('2d').drawImage(cv, cv.width - sw, 0, sw, cv.height, 0, 0, strip.width, strip.height);
  return strip.toDataURL('image/jpeg', 0.8);
}

// ── AI plumbing (ask-ai SSE) ──────────────────────────────────────────────────
async function aiCall(prompt, images) {
  const body = {
    projectContext: { name: S.projectName || 'Take-off Lab', isSub: false },
    messages: [{ role: 'user', content: prompt }],
  };
  if (images && images.length) body.planImages = images.slice(0, MAX_IMAGES);
  const res = await fetch(`${SUPABASE_URL}/functions/v1/ask-ai`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buffer = '', full = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += dec.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop() ?? '';
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      let evt; try { evt = JSON.parse(line.slice(6)); } catch { continue; }
      if (evt.type === 'delta') full += evt.text;
      else if (evt.type === 'error') throw new Error(evt.message || 'AI error');
    }
  }
  return full;
}
function parseAIJson(text) {
  if (!text) return null;
  let t = String(text).trim();
  const fence = t.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fence) t = fence[1].trim();
  const start = t.search(/[{[]/);
  if (start > 0) t = t.slice(start);
  for (let end = t.length; end > 0; end--) {
    const c = t[end - 1];
    if (c !== '}' && c !== ']') continue;
    try { return JSON.parse(t.slice(0, end)); } catch (_e) { /* keep trimming */ }
  }
  return null;
}

// ── Agent 1 · Sheet classifier ───────────────────────────────────────────────
// Sends PAIRS per page: high-res title-block strip + small overview, batched
// so each call stays under the 25-image server cap.
async function agentClassify() {
  if (S.classifying || !S.pages.length) return;
  S.classifying = true; S.cancel = false; render();
  log('Agent 1 · Sheet classifier — reading title blocks at high zoom…');
  try {
    const BATCH = 12; // 12 pages × 2 images = 24 ≤ 25
    for (let b = 0; b < S.pages.length; b += BATCH) {
      if (S.cancel) { log('Stopped by user.', 'warn'); break; }
      const batch = S.pages.slice(b, b + BATCH);
      const imgs = [];
      for (const p of batch) {
        imgs.push(await titleStripFor(p));
        imgs.push((await renderPageImage(p, 900)).toDataURL('image/jpeg', 0.7));
      }
      const prompt = `You are indexing a construction plan set. The attached images come in PAIRS per page: first the TITLE-BLOCK STRIP (right edge, zoomed — read the sheet number, sheet title and level here), then a small full-page overview. So images 1-2 = PAGE 1, images 3-4 = PAGE 2, and so on. There are ${batch.length} pages.

Types (pick ONE per page):
- assembly_plan  (wall/floor assembly diagrams with a color legend)
- rcp            (reflected ceiling plan — has ceiling heights)
- finish_plan    (finish floor plan with material tags)
- finish_spec    (finish specification TABLES — tags like TL-1/CT-3 with materials and $/SF)
- floor_plan     (regular architectural floor plan)
- elevations     (interior/exterior elevations)
- sections       (building sections)
- schedule       (door/window/fixture schedules)
- cover_or_other

Return STRICT JSON ONLY:
{"pages":[{"page":1,"sheet":"A2.00","type":"assembly_plan","level":"LEVEL 0","note":"5 words max"}]}`;
      const text = await aiCall(prompt, imgs);
      const parsed = parseAIJson(text);
      if (!parsed || !Array.isArray(parsed.pages)) throw new Error('Could not read the classification.');
      for (const c of parsed.pages) {
        const idx = Number(c.page) - 1;
        if (idx >= 0 && idx < batch.length) {
          batch[idx].cls = { type: String(c.type || 'cover_or_other'), sheet: String(c.sheet || ''), level: String(c.level || ''), note: String(c.note || '') };
        }
      }
      log(`Agent 1 — pages ${b + 1}-${Math.min(b + BATCH, S.pages.length)} classified.`);
      render();
    }
    log('Agent 1 done.', 'ok');
  } catch (e) {
    log('Agent 1 failed: ' + (e.message || e), 'err');
  } finally {
    S.classifying = false; render();
  }
}

// ── Presets (Agent 2 briefs) ─────────────────────────────────────────────────
const PRESETS = {
  walls: {
    label: 'Interior walls + ceilings',
    sub: 'Plaster/stucco/gyp — length × RCP height per room; ceilings per room.',
    pageTypes: ['assembly_plan', 'rcp', 'floor_plan', 'finish_spec'],
    prompt: `TAKE-OFF TYPE: INTERIOR WALL FINISHES + CEILINGS.
For every level and room: interior wall finish areas (plaster/stucco, gypsum, or per the typical-assembly note) and ceiling areas.
- Assembly legend colors + "TYPICAL ASSEMBLIES ... UNLESS OTHERWISE NOTED" notes define untagged walls.
- READ each level's ceiling height from the RCP sheets — they differ per level, never assume.
- WALLS rows: cat "WALLS", material = assembly/finish tag or name, dims = wall length FT (sum segments per room+material), height = level ceiling height FT, unit "SF".
- CEILING rows: cat "CEILING", dims = room ceiling area SF, no height, unit "SF".`,
  },
  tiles: {
    label: 'Tile, countertops & floors',
    sub: 'TL-x walls (len×ht), CT-x countertops SF, FF-x floors SF — from the finish spec table.',
    pageTypes: ['finish_spec', 'finish_plan', 'elevations', 'floor_plan'],
    prompt: `TAKE-OFF TYPE: TILE, COUNTERTOPS & FLOOR FINISHES.
Use the FINISH SPECIFICATIONS tag tables (TL-x, CT-x, FF-x, ST-x — note printed $/SF), the FINISH FLOOR PLANS and the INTERIOR ELEVATIONS.
- Tiled/stone WALLS: cat "WALLS", material = tag, dims = length FT, height = tiled height FT, unit "SF".
- COUNTERTOP: cat "COUNTERTOP", material = CT tag, dims = area SF from casework elevations/plans, unit "SF".
- FLOOR: cat "FLOOR", material = FF tag, dims = room area SF, unit "SF".
- Every row carries the room name+number (e.g. "BATH 106").`,
  },
  plumbing: {
    label: 'Plumbing fixtures',
    sub: 'WC, lavs, sinks, tubs, showers, drains… counted per level & room (EA).',
    pageTypes: ['floor_plan', 'finish_plan', 'elevations', 'schedule'],
    prompt: `TAKE-OFF TYPE: PLUMBING FIXTURE COUNT.
Count fixtures per level and room: water closets, lavatories, sinks, tubs, showers (rain heads / hand showers separately), steam/sauna gear, washer boxes, hose bibbs, floor drains, pool/spa equipment when shown.
- Rows: cat "FIXTURE", material = fixture type (e.g. "WC", "LAV"), dims = count, unit "EA".`,
  },
  custom: {
    label: 'Custom take-off',
    sub: 'Describe it: doors & windows, LF of baseboard, light fixtures by type…',
    pageTypes: null,
    prompt: `TAKE-OFF TYPE: CUSTOM — quantify exactly what the user asks below. Pick the right cat (WALLS/CEILING/FLOOR/COUNTERTOP/FIXTURE/OTHER) and unit (SF, LF, EA) per row.`,
  },
};

// ── Agent 2 · Extractor — two phases, sheet by sheet ─────────────────────────
// Phase A reads the REFERENCE sheets (spec tables, RCP heights, typical
// assembly notes) into a text context. Phase B loops the measurable sheets
// ONE AT A TIME, each with its own high-res tiles + the Phase A context.
// Slower than one big call, but each page is actually legible.
const REF_TYPES = ['finish_spec', 'rcp'];
const MEASURE_TYPES = { walls: ['assembly_plan', 'floor_plan'], tiles: ['finish_plan', 'elevations', 'floor_plan'], plumbing: ['floor_plan', 'finish_plan', 'elevations'], custom: null };

function extractionPlan(key) {
  const anyChecked = S.pages.some(p => p.use === true);
  const pick = (pred) => S.pages.map((p, idx) => ({ p, idx })).filter(x => pred(x.p));
  let refs = pick(p => p.cls && REF_TYPES.includes(p.cls.type));
  let sheets;
  if (anyChecked) {
    sheets = pick(p => p.use === true);
    refs = refs.filter(r => !sheets.some(s => s.idx === r.idx));
  } else {
    const types = MEASURE_TYPES[key];
    const classified = S.pages.some(p => p.cls);
    if (!classified) { sheets = pick(() => true).slice(0, 6); refs = []; }
    else if (!types) { sheets = pick(p => p.cls && !['cover_or_other', 'sections'].includes(p.cls.type) && !REF_TYPES.includes(p.cls.type)); }
    else { sheets = pick(p => p.cls && types.includes(p.cls.type)); }
  }
  return { refs: refs.slice(0, 6), sheets: sheets.slice(0, 12) };
}

async function agentReadReferences(refs) {
  let ctx = '';
  for (const ref of refs) {
    if (S.cancel) break;
    const name = (ref.p.cls && ref.p.cls.sheet) || ('page ' + ref.p.num);
    log(`Agent 2a — reading reference sheet ${name}…`);
    try {
      const tiles = await tileImagesFor(ref.p, 3);
      const prompt = `You are reading ONE reference sheet of a construction plan set: ${name}${ref.p.cls ? ' (' + ref.p.cls.type + (ref.p.cls.level ? ', ' + ref.p.cls.level : '') + ')' : ''}.
The attached images are: 1 full-page overview, then ${tiles.length - 1} zoomed tiles of the SAME page (read fine text in the tiles).

Extract, ONLY what is actually printed:
- Ceiling heights per level/room (RCP: e.g. 8'-0", 10'-0") — say which level/rooms.
- Finish/assembly tag tables: tag, material description, and printed $/SF when shown (e.g. "TL-1 TILE $45/SF").
- "TYPICAL ..." / "UNLESS OTHERWISE NOTED" notes verbatim.
- Anything else an estimator needs from this sheet (scale, level name).

Return STRICT JSON ONLY: {"facts":["one fact per line, compact, e.g. 'RCP LEVEL 1: typical ceiling height 8-6'","'TL-2 = tile $30/SF material only'"]}. If the sheet is unreadable return {"facts":[]}.`;
      const text = await aiCall(prompt, tiles.map(t => t.url));
      const parsed = parseAIJson(text);
      if (parsed && Array.isArray(parsed.facts) && parsed.facts.length) {
        ctx += `\nFROM ${name}:\n` + parsed.facts.slice(0, 30).map(f => '- ' + String(f).slice(0, 160)).join('\n');
        log(`Agent 2a — ${name}: ${parsed.facts.length} fact(s).`);
      } else {
        log(`Agent 2a — ${name}: nothing legible.`, 'warn');
      }
    } catch (e) {
      log(`Agent 2a — ${name} failed: ${e.message || e}`, 'warn');
    }
  }
  return ctx.trim();
}

async function agentExtract() {
  if (S.extracting || !S.pages.length) return;
  const preset = PRESETS[S.preset];
  S.guidance = document.getElementById('to-guidance')?.value ?? S.guidance;
  if (S.preset === 'custom' && !S.guidance.trim()) { alert('Describe what to quantify first.'); return; }
  S.extracting = true; S.cancel = false; render();
  const plan = extractionPlan(S.preset);
  if (!plan.sheets.length) { log('No measurable sheets selected/classified — run Agent 1 or tick pages to include.', 'err'); S.extracting = false; render(); return; }
  log(`Agent 2 · Extractor — ${plan.refs.length} reference sheet(s) + ${plan.sheets.length} sheet(s) to measure, one at a time. This takes a few minutes — accuracy over speed. ☕`);
  const CATS_OK = ['WALLS', 'CEILING', 'FLOOR', 'COUNTERTOP', 'FIXTURE', 'OTHER'];
  const allRows = [], allMissing = [];
  try {
    const refCtx = plan.refs.length ? await agentReadReferences(plan.refs) : '';
    for (const s of plan.sheets) {
      if (S.cancel) { log('Stopped by user — keeping what was measured so far.', 'warn'); break; }
      const name = (s.p.cls && s.p.cls.sheet) || ('page ' + s.p.num);
      log(`Agent 2b — measuring ${name}…`);
      try {
        const tiles = await tileImagesFor(s.p, 3);
        const prompt = `You are a professional construction estimator doing a QUANTITY TAKE-OFF of ONE plan sheet: ${name}${s.p.cls ? ' (' + s.p.cls.type + (s.p.cls.level ? ', ' + s.p.cls.level : '') + ')' : ''}.
Attached: image 1 = full-page overview (marks reference THIS image), images 2-${tiles.length} = zoomed tiles of the SAME page — read dimensions, room tags and legends in the tiles.

${preset.prompt}
${refCtx ? `
FACTS ALREADY READ FROM THE SET'S REFERENCE SHEETS (use these heights/tags — do not re-guess them):
${refCtx}` : ''}
${S.guidance.trim() ? `
USER GUIDANCE — respect this:
${S.guidance.slice(0, 500)}` : ''}

HOW TO MEASURE:
- ONLY take off what THIS sheet shows. Prefer PRINTED dimensions; when estimating from drawing scale, be conservative and set "est": true.
- One row per room × material. "level" exactly as named. "space" = room name + number (e.g. "BATH 106").
- Deductions (openings, casework, pools within an area): NEGATIVE dims row with a note.
- If THIS sheet is still not legible enough to measure, return {"rows":[],"missing":["${name}: what exactly is unreadable"]} — NEVER fabricate numbers.
- MARKS: rectangles locating what you measured, on IMAGE 1 (the overview): {"x":0-1000,"y":0-1000,"w":0-1000,"h":0-1000}, up to 4 per row, tight boxes.

Return STRICT JSON ONLY:
{"rows":[{"cat":"WALLS","level":"LEVEL 0","space":"BATH 106","material":"TL-2","dims":16.81,"height":8,"unit":"SF","est":false,"note":"","marks":[{"x":410,"y":220,"w":180,"h":14}]}],"missing":[],"notes":""}
Row rules: cat WALLS|CEILING|FLOOR|COUNTERTOP|FIXTURE|OTHER · unit SF with height → total = dims×height · SF without height → dims IS the SF · EA → count · LF → linear feet.`;
        const text = await aiCall(prompt, tiles.map(t => t.url));
        const parsed = parseAIJson(text);
        if (!parsed) { allMissing.push(name + ': unreadable AI reply'); continue; }
        const rows = (Array.isArray(parsed.rows) ? parsed.rows : []).map(r => ({
          cat: CATS_OK.includes(String((r && r.cat) || '').toUpperCase()) ? String(r.cat).toUpperCase() : 'OTHER',
          level: String((r && r.level) || (s.p.cls && s.p.cls.level) || '').slice(0, 24),
          space: String((r && r.space) || '').slice(0, 48),
          material: String((r && r.material) || '').slice(0, 32),
          dims: Number(r && r.dims) || 0,
          height: (r && r.height != null && r.height !== '' && Number(r.height) > 0) ? Number(r.height) : null,
          unit: ['SF', 'LF', 'EA'].includes(String((r && r.unit) || '').toUpperCase()) ? String(r.unit).toUpperCase() : 'SF',
          est: !!(r && r.est),
          note: String((r && r.note) || '').slice(0, 120),
          src: name,
          marks: Array.isArray(r && r.marks) ? r.marks.slice(0, 4).map(mk => ({ page: s.idx, x: Number(mk.x) || 0, y: Number(mk.y) || 0, w: Number(mk.w) || 0, h: Number(mk.h) || 0 })).filter(mk => mk.w > 0 && mk.h > 0) : [],
        })).filter(r => r.dims !== 0 || r.note);
        allRows.push(...rows);
        for (const ms of (Array.isArray(parsed.missing) ? parsed.missing : [])) allMissing.push(String(ms).slice(0, 160));
        log(`Agent 2b — ${name}: ${rows.length} row(s).`, rows.length ? 'ok' : 'warn');
      } catch (e) {
        allMissing.push(name + ': ' + (e.message || e));
        log(`Agent 2b — ${name} failed: ${e.message || e}`, 'warn');
      }
    }
    if (!allRows.length) throw new Error('No sheet produced usable rows — see Missing/verify and the log.');
    S.takeoff = {
      id: 'to_' + Date.now(), ts: new Date().toISOString(), preset: S.preset,
      label: preset.label + ' · ' + (S.projectName || 'plans') + ' · ' + new Date().toLocaleDateString(),
      rows: allRows,
      missing: allMissing.slice(0, 20),
      notes: `Measured ${plan.sheets.length} sheet(s)` + (plan.refs.length ? ` with ${plan.refs.length} reference sheet(s) read first` : ''),
      issues: [],
    };
    S.saved.push(S.takeoff); persist();
    S.sheetOpen = true;
    log(`Agent 2 done — ${allRows.length} rows from ${plan.sheets.length} sheet(s).`, 'ok');
  } catch (e) {
    log('Agent 2 failed: ' + (e.message || e), 'err');
  } finally {
    S.extracting = false; render();
  }
}

// ── Agent 3 · Checker (optional) ─────────────────────────────────────────────
async function agentVerify() {
  const t = S.takeoff; if (!t || S.verifying) return;
  S.verifying = true; render();
  log('Agent 3 · Checker — re-reading the sheets against the numbers…');
  try {
    const plan = extractionPlan(t.preset);
    const imgs = [];
    for (const s of plan.sheets.slice(0, 4)) {
      const tiles = await tileImagesFor(s.p, 2);
      for (const ti of tiles) imgs.push(ti.url);
    }
    const sheetTxt = t.rows.map(r => `${r.cat} | ${r.level} | ${r.space} | ${r.material} | ${r.dims}${r.height ? ' × ' + r.height : ''} = ${fmtNum(rowTotal(r))} ${r.unit}`).join('\n');
    const prompt = `You are a senior estimator CHECKING a colleague's take-off against the attached plan pages. Be adversarial but practical.

THE TAKE-OFF SHEET:
${sheetTxt}

Check for: (1) rooms/levels on the sheets that are MISSING from the take-off, (2) rows whose dims/heights contradict printed dimensions or RCP heights, (3) wrong material tags, (4) double counting. Do NOT nitpick rounding under 5%.

Return STRICT JSON ONLY: {"issues":["specific, actionable finding (say the room + what is wrong + the number you'd expect)"]}. Empty array if it holds up.`;
    const text = await aiCall(prompt, imgs);
    const parsed = parseAIJson(text);
    t.issues = (parsed && Array.isArray(parsed.issues)) ? parsed.issues.map(x => String(x).slice(0, 220)).slice(0, 10) : [];
    persist();
    log(`Agent 3 done — ${t.issues.length} finding(s).`, t.issues.length ? 'warn' : 'ok');
  } catch (e) {
    log('Agent 3 failed: ' + (e.message || e), 'err');
  } finally {
    S.verifying = false; render();
  }
}

// ── Sheet math & edits ───────────────────────────────────────────────────────
function rowTotal(r) { return (r.unit === 'SF' && r.height) ? r.dims * r.height : r.dims; }
function totalsOf(t) {
  const byMat = {}, byLevel = {};
  for (const r of t.rows) {
    const tot = rowTotal(r);
    byMat[(r.material || '(untagged)') + '|' + r.unit] = (byMat[(r.material || '(untagged)') + '|' + r.unit] || 0) + tot;
    byLevel[(r.level || '(no level)') + '|' + r.unit] = (byLevel[(r.level || '(no level)') + '|' + r.unit] || 0) + tot;
  }
  return { byMat, byLevel };
}
function setCell(idx, field, value) {
  const t = S.takeoff; if (!t || !t.rows[idx]) return;
  if (field === 'dims' || field === 'height') {
    const n = Number(value);
    t.rows[idx][field] = (field === 'height' && (value === '' || value == null)) ? null : (isNaN(n) ? 0 : (field === 'height' ? Math.max(0, n) : n));
    if (t.rows[idx].est) t.rows[idx].est = false;
  } else {
    t.rows[idx][field] = String(value);
  }
  persist();
  const el = document.getElementById('to-total-' + idx);
  if (el) el.textContent = fmtNum(rowTotal(t.rows[idx]));
  const foot = document.getElementById('to-footer');
  if (foot) foot.innerHTML = totalsHtml(t);
}
function addRow() {
  const t = S.takeoff; if (!t) return;
  const last = t.rows[t.rows.length - 1] || {};
  t.rows.push({ cat: last.cat || 'WALLS', level: last.level || '', space: '', material: last.material || '', dims: 0, height: last.height != null ? last.height : null, unit: last.unit || 'SF', est: false, note: '', marks: [] });
  persist(); render();
}
function delRow(idx) { const t = S.takeoff; if (!t) return; t.rows.splice(idx, 1); persist(); render(); }
function openSaved(id) {
  const t = S.saved.find(x => x.id === id); if (!t) return;
  S.takeoff = t; S.sheetOpen = true; S.preset = t.preset || 'walls'; render();
}
function deleteSaved(id) {
  if (!confirm('Delete this saved take-off?')) return;
  S.saved = S.saved.filter(x => x.id !== id);
  if (S.takeoff && S.takeoff.id === id) { S.takeoff = null; S.sheetOpen = false; }
  persist(); render();
}

// ── CSV export ───────────────────────────────────────────────────────────────
function exportCSV() {
  const t = S.takeoff; if (!t) return;
  const rows = [['Category', 'Level', 'Space', 'Material', 'Dims', 'Height', 'Unit', 'Total', 'AI estimate', 'Note']];
  for (const r of t.rows) rows.push([r.cat, r.level, r.space, r.material, r.dims, r.height ?? '', r.unit, rowTotal(r).toFixed(2), r.est ? 'YES' : '', r.note]);
  const { byMat, byLevel } = totalsOf(t);
  rows.push([]); rows.push(['TOTALS BY MATERIAL']);
  for (const [k, v] of Object.entries(byMat)) { const [mat, unit] = k.split('|'); rows.push(['', '', '', mat, '', '', unit, v.toFixed(2)]); }
  rows.push([]); rows.push(['TOTALS BY LEVEL']);
  for (const [k, v] of Object.entries(byLevel)) { const [lv, unit] = k.split('|'); rows.push(['', lv, '', '', '', '', unit, v.toFixed(2)]); }
  if (t.missing.length) { rows.push([]); rows.push(['MISSING / VERIFY']); t.missing.forEach(x => rows.push(['', x])); }
  if ((t.issues || []).length) { rows.push([]); rows.push(['CHECKER FINDINGS']); t.issues.forEach(x => rows.push(['', x])); }
  const csv = rows.map(r => r.map(c => { const s = String(c ?? ''); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; }).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob); const a = document.createElement('a');
  a.href = url; a.download = (S.projectName || 'takeoff').replace(/[^a-zA-Z0-9._-]/g, '_') + '-takeoff-' + new Date().toISOString().slice(0, 10) + '.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ── Marked pages (the highlighted-PDF look) ──────────────────────────────────
function marksByPage() {
  const map = {};
  if (!S.takeoff) return map;
  S.takeoff.rows.forEach((r, ri) => {
    for (const mk of (r.marks || [])) {
      if (!map[mk.page]) map[mk.page] = [];
      map[mk.page].push({ ...mk, material: r.material, label: `${r.material || r.cat} · ${fmtNum(rowTotal(r))} ${r.unit}`, ri });
    }
  });
  return map;
}
async function drawMarkedPage(idx) {
  const p = S.pages[idx]; if (!p) return null;
  const cv = await renderPageImage(p, FULL_W, 0.85);
  const ctx = cv.getContext('2d');
  const marks = marksByPage()[idx] || [];
  for (const mk of marks) {
    const col = matColor(mk.material);
    const x = mk.x / 1000 * cv.width, y = mk.y / 1000 * cv.height;
    const w = mk.w / 1000 * cv.width, h = mk.h / 1000 * cv.height;
    ctx.save();
    ctx.globalAlpha = 0.22; ctx.fillStyle = col; ctx.fillRect(x, y, w, h);
    ctx.globalAlpha = 1; ctx.lineWidth = 2.5; ctx.strokeStyle = col; ctx.strokeRect(x, y, w, h);
    // label chip
    ctx.font = '700 15px Consolas, monospace';
    const tw = ctx.measureText(mk.label).width + 12;
    const ly = Math.max(2, y - 22);
    ctx.fillStyle = col; ctx.fillRect(x, ly, tw, 20);
    ctx.fillStyle = '#fff'; ctx.fillText(mk.label, x + 6, ly + 15);
    ctx.restore();
  }
  return cv;
}
async function openViewer(idx) { S.viewer = { idx }; render(); await paintViewer(); }
async function paintViewer() {
  const v = S.viewer; if (!v) return;
  const holder = document.getElementById('viewer-canvas'); if (!holder) return;
  holder.innerHTML = '<div style="padding:60px;text-align:center;color:var(--text3);font-family:var(--mono);font-size:11px"><span class="spin"></span> rendering…</div>';
  const cv = await drawMarkedPage(v.idx);
  if (!cv || !S.viewer || S.viewer.idx !== v.idx) return;
  cv.style.width = '100%'; cv.style.height = 'auto'; cv.style.display = 'block';
  holder.innerHTML = ''; holder.appendChild(cv);
}
async function downloadMarkedPage(idx) {
  const cv = await drawMarkedPage(idx); if (!cv) return;
  const p = S.pages[idx];
  const a = document.createElement('a');
  a.href = cv.toDataURL('image/jpeg', 0.88);
  a.download = ((p.cls && p.cls.sheet) || ('page' + p.num)).replace(/[^a-zA-Z0-9._-]/g, '_') + '-marked.jpg';
  a.click();
}
async function downloadAllMarked() {
  const pages = Object.keys(marksByPage()).map(Number).sort((a, b) => a - b);
  if (!pages.length) { alert('No marked pages in this take-off yet.'); return; }
  for (const idx of pages) { await downloadMarkedPage(idx); await new Promise(r => setTimeout(r, 350)); }
}

  const { byMat, byLevel } = totalsOf(t);

  </div>`;

              ${marks[idx] ? `<span style="position:absolute;top:3px;right:3px;background:var(--amber);color:#fff;font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:7px">${marks[idx].length} ✎</span>` : ''}
              <div style="padding:3px 5px;display:flex;justify-content:space-between;align-items:center;gap:3px">
                <span style="font-family:var(--mono);font-size:8px;color:var(--text3)"><input type="checkbox" ${p.use === true ? 'checked' : ''} onchange="S.pages[${idx}].use=this.checked?true:undefined;render()" style="vertical-align:-2px;accent-color:var(--amber)"> p.${p.num}</span>${clsChip(p.cls)}
              </div>
            </div>`).join('')}
          </div>
        </div>
      </div>

      <!-- RIGHT: workflow -->
      <div>
        <div class="card">
          <div class="kicker" style="margin-bottom:10px">2 · What do you need quantified?</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px">
            ${Object.entries(PRESETS).map(([k, pr]) => `<div onclick="S.preset='${k}';render()" style="cursor:pointer;border:1px solid ${S.preset === k ? 'var(--amber)' : 'var(--border)'};background:${S.preset === k ? 'var(--amber-bg)' : 'var(--bg1)'};border-radius:var(--r2);padding:10px 12px">
              <div style="font-size:12.5px;font-weight:600;color:var(--ink-900)">${esc(pr.label)}</div>
              <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:3px;line-height:1.45">${esc(pr.sub)}</div>
            </div>`).join('')}
          </div>
          <div style="display:flex;gap:8px;margin-top:10px;align-items:flex-start;flex-wrap:wrap">
            <textarea id="to-guidance" rows="2" class="minp" placeholder="Guidance (optional) — e.g. only levels 2-3, plaster walls only, heights per RCP…" style="flex:1;min-width:260px;resize:vertical">${esc(S.guidance)}</textarea>
            <button class="btn btn-amber" ${S.extracting || !S.pages.length ? 'disabled' : ''} onclick="agentExtract()" title="${S.pages.length ? '' : 'Upload the plan set first'}">${S.extracting ? '<span class="spin"></span> Measuring sheet by sheet…' : '✦ Agent 2 · Run take-off'}</button>
            ${(S.extracting || S.classifying) ? `<button class="btn btn-red" onclick="S.cancel=true">■ Stop</button>` : ''}
          </div>
          ${S.pages.length && !S.pages.some(p => p.cls) ? '<div style="font-family:var(--mono);font-size:9.5px;color:var(--text3);margin-top:6px">Tip: run Agent 1 first — the extractor then measures ONLY the relevant sheets, one at a time, in high-res tiles (this is what makes the numbers real).</div>' : ''}
          ${S.pages.length ? `<div style="font-family:var(--mono);font-size:9.5px;color:var(--text3);margin-top:4px">Each sheet is sent as a zoomed 3×3 mosaic — a full run takes a few minutes. You can ■ Stop anytime and keep what's measured.</div>` : ''}
        </div>

        ${S.sheetOpen && S.takeoff ? buildSheet() : ''}

        ${S.saved.length ? `<div class="card" style="margin-top:14px">
          <div class="kicker" style="margin-bottom:8px">Saved take-offs <span style="color:var(--text3)">(sheets persist here — page marks need the same PDF uploaded)</span></div>
          <div style="display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto">
            ${S.saved.slice().reverse().map(t => `<div style="display:flex;justify-content:space-between;gap:8px;border:1px solid var(--border);padding:7px 10px;font-size:12px;align-items:center">
              <span onclick="openSaved('${t.id}')" style="cursor:pointer;color:var(--ink-900)">${esc(t.label)}</span>
              <span style="display:flex;gap:6px;align-items:center"><span style="font-family:var(--mono);font-size:10px;color:var(--text3)">${t.rows.length} rows</span><button class="btn btn-sm btn-red" style="padding:2px 7px" onclick="deleteSaved('${t.id}')">✕</button></span>
            </div>`).join('')}
          </div>
        </div>` : ''}

        <div class="card" style="margin-top:14px">
          <div class="kicker" style="margin-bottom:6px">Agent run log</div>
          <div id="runlog" style="max-height:150px;overflow-y:auto;font-family:var(--mono);font-size:10.5px;line-height:1.7">
            ${S.runLog.length ? S.runLog.map(l => `<div style="color:${l.cls === 'err' ? 'var(--red)' : l.cls === 'ok' ? 'var(--green)' : l.cls === 'warn' ? 'var(--amber)' : 'var(--text2)'}">${l.ts} — ${esc(l.msg)}</div>`).join('') : '<span style="color:var(--text3)">Waiting for a plan set…</span>'}
          </div>
        </div>
      </div>
    </div>
    <div style="text-align:center;margin-top:26px;font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:var(--text3)">NOVANTU LABS · TAKE-OFF v0.1 — experimental · AI-measured rows are marked ~ · always verify before bidding</div>
  </div>

  ${S.viewer ? `<div class="backdrop" onclick="if(event.target===this){S.viewer=null;render()}">
    <div class="modal" style="max-width:1060px" onclick="event.stopPropagation()">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
        <div>
          <div style="font-weight:700;color:var(--ink-900)">${esc(((S.pages[S.viewer.idx] || {}).cls || {}).sheet || 'Page ' + ((S.pages[S.viewer.idx] || {}).num || ''))} <span style="font-family:var(--mono);font-size:10px;color:var(--text3)">· ${(marksByPage()[S.viewer.idx] || []).length} mark(s)</span></div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-sm" ${S.viewer.idx <= 0 ? 'disabled' : ''} onclick="openViewer(${S.viewer.idx - 1})">← Prev</button>
          <button class="btn btn-sm" ${S.viewer.idx >= S.pages.length - 1 ? 'disabled' : ''} onclick="openViewer(${S.viewer.idx + 1})">Next →</button>
          <button class="btn btn-sm" onclick="downloadMarkedPage(${S.viewer.idx})">⬇ Download marked</button>
          <button class="btn btn-sm" onclick="S.viewer=null;render()">✕ Close</button>
        </div>
      </div>
      <div id="viewer-canvas" style="border:1px solid var(--border);background:#fff"></div>
    </div>
  </div>` : ''}`;
  if (S.viewer) setTimeout(paintViewer, 30); // re-render rebuilt the holder — repaint it
}
render();
</script>
</body>
</html>
