<style>
  :root{
    --bg:#f5f2ea; --bg1:#efece2; --bg2:#e7e3d6; --bg3:#dfdacb;
    --ink-950:#181613; --ink-900:#232019; --ink-700:#4a453a;
    --bone-50:#faf8f2; --text:#2c2820; --text2:#5c564a; --text3:#8a857a;
    --border:#d8d2c2; --rule:#c9c2b0;
    --amber:#b8860b; --amber-bg:#f5edd8; --amber-border:#d9c48a;
    --red:#c44a2c; --red-bg:#f7e6e0; --red-border:#e0b3a4;
    --green:#4a7c59; --green-bg:#e4eee7;
    --mono:'SF Mono','Cascadia Code',Consolas,monospace;
    --sans:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --r:4px; --r2:8px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px}
  .kicker{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);font-weight:600}
  .btn{display:inline-flex;align-items:center;gap:7px;border-radius:var(--r2);padding:9px 16px;font-family:var(--mono);font-size:11.5px;font-weight:600;letter-spacing:.04em;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--ink-900)}
  .btn:disabled{opacity:.5;cursor:wait}
  .btn-amber{background:var(--amber);border-color:var(--amber);color:var(--bone-50)}
  .btn-ink{background:var(--ink-950);border-color:var(--ink-950);color:var(--bone-50)}
  .btn-sm{padding:5px 10px;font-size:10.5px}
  .btn-red{color:var(--red);border-color:var(--red-border)}
  .card{background:var(--bone-50);border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px}
  .minp{border:1px solid var(--border);border-radius:var(--r);padding:6px 8px;font-family:var(--mono);font-size:11.5px;background:#fff;color:var(--text);outline:none}
  .minp:focus{border-color:var(--amber)}
  textarea.minp{font-family:var(--sans);font-size:12.5px}
  .spin{display:inline-block;width:11px;height:11px;border:2px solid var(--text3);border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-1px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .chip{display:inline-block;font-family:var(--mono);font-size:8.5px;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:9px;border:1px solid var(--border);background:var(--bg1);color:var(--text2)}
  .backdrop{position:fixed;inset:0;background:rgba(24,22,19,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal{background:var(--bone-50);border:1px solid var(--rule);border-radius:10px;padding:20px 22px;max-height:92vh;overflow-y:auto;width:100%}
  table.sheet{width:100%;border-collapse:collapse;font-size:11.5px}
  table.sheet th{text-align:left;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:7px 8px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg1);z-index:1}

  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:5px}
  ::-webkit-scrollbar-track{background:transparent}
</style>

<body>
<div id="app"></div>
<script>
'use strict';
/* ============================================================
   NOVANTU TAKE-OFF LAB — standalone experimental tool.
   Upload a plan set → a pipeline of three AI agents quantifies it:
     Agent 1 · Sheet classifier  — what is each page (assembly / RCP /
                                    finish plan / spec table / elevations)
     Agent 2 · Take-off extractor — quantities per level·space·material,
                                    with rectangle marks on the pages
     Agent 3 · Checker (optional) — re-reads the sheets vs the numbers
   Output: an editable sheet with live totals by material & level,
   Excel/CSV export, and MARKED-UP plan pages (color per material + SF
   labels) you can download as images — like a hand-highlighted take-off.
   AI calls go through NOVANTU's existing ask-ai edge function.
   ============================================================ */

if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

const SUPABASE_URL = 'https://gvpsxsqloeklghcaxudg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2cHN4c3Fsb2VrbGdoY2F4dWRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MjM1ODcsImV4cCI6MjA5NTE5OTU4N30.KyhbD-ZEg-OG9PXAKlodBQRqgLK1_P_AkQMtJptp_VI';
const MAX_IMAGES = 25;          // server-side cap in ask-ai
const FULL_W = 1500;            // extraction render width (text must be legible)
const CLS_W = 900;              // classification render width
const THUMB_W = 230;

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  projectName: '',
  pages: [],          // [{doc, num, name, thumb, cls:{type,level,sheet,note}|null, canvas? }]
  loading: false,
  classifying: false,
  extracting: false,
  verifying: false,
  preset: 'walls',
  guidance: '',
  takeoff: null,      // active {id, ts, preset, label, rows[], missing[], notes, issues[]}
  saved: [],          // localStorage — sheets survive, marks need the same PDF re-uploaded
  runLog: [],
  viewer: null,       // {idx}
  sheetOpen: false,
};
try { S.saved = JSON.parse(localStorage.getItem('nvto_saved') || '[]'); } catch (_e) { S.saved = []; }
function persist() { try { localStorage.setItem('nvto_saved', JSON.stringify(S.saved.slice(-12))); } catch (_e) {} } // engine rows carry segment marks — keep fewer sheets so localStorage never overflows

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) { return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
function fmtNum(n) { return (Math.round(Number(n) * 100) / 100).toLocaleString(); }
function log(msg, cls) { S.runLog.push({ ts: new Date().toLocaleTimeString(), msg, cls: cls || '' }); render(); const el = document.getElementById('runlog'); if (el) el.scrollTop = el.scrollHeight; }
// Any silent JS error becomes a visible run-log line — a dead button must
// never look like "nothing happened".
let _errBusy = false;
function _reportErr(msg) { if (_errBusy) return; _errBusy = true; try { log('⚠ JS error: ' + msg, 'err'); } catch (_x) {} _errBusy = false; }
window.addEventListener('error', (e) => _reportErr(e.message));
window.addEventListener('unhandledrejection', (e) => _reportErr((e.reason && e.reason.message) || e.reason));

// Color per material — known construction tags first, stable hash otherwise.
const MAT_PALETTE = ['#2563eb', '#0891b2', '#7c3aed', '#c2410c', '#15803d', '#be185d', '#a16207', '#0f766e', '#dc2626', '#4d7c0f'];
function matColor(mat) {
  const m = String(mat || '').toUpperCase();
  if (/^PL|PLASTER|STUCCO/.test(m)) return '#2563eb';   // blue — like the assembly legend
  if (/^GYP|W-2|GYPSUM/.test(m)) return '#0891b2';      // cyan
  if (/^TL|TILE/.test(m)) return '#7c3aed';             // purple
  if (/^ST|STONE/.test(m)) return '#dc2626';            // red
  if (/^CT/.test(m)) return '#c2410c';                  // orange — countertops
  if (/^FF|FLOOR/.test(m)) return '#15803d';            // green
  if (/^WD|WOOD|WP/.test(m)) return '#4d7c0f';
  if (/^MTL|METAL/.test(m)) return '#be185d';
  let h = 0; for (let i = 0; i < m.length; i++) h = (h * 31 + m.charCodeAt(i)) >>> 0;
  return MAT_PALETTE[h % MAT_PALETTE.length];
}

// ── PDF loading ───────────────────────────────────────────────────────────────
async function handleFiles(files) {
  const list = Array.from(files || []).filter(f => /pdf$/i.test(f.name));
  if (!list.length) return;
  S.loading = true; render();
  try {
    for (const f of list) {
      const buf = await f.arrayBuffer();
      const doc = await pdfjsLib.getDocument({ data: buf }).promise;
      if (!S.projectName) S.projectName = f.name.replace(/\.pdf$/i, '');
      for (let n = 1; n <= doc.numPages; n++) {
        const page = await doc.getPage(n);
        const vp1 = page.getViewport({ scale: 1 });
        const mk = async (w, q) => {
          const scale = w / vp1.width;
          const vp = page.getViewport({ scale });
          const cv = document.createElement('canvas');
          cv.width = Math.round(vp.width); cv.height = Math.round(vp.height);
          await page.render({ canvasContext: cv.getContext('2d'), viewport: vp }).promise;
          return cv.toDataURL('image/jpeg', q);
        };
        S.pages.push({
          name: f.name, num: n,
          thumb: await mk(THUMB_W, 0.6),
          cls: null,
        });
        // full/cls renders are made lazily (RAM) — keep the page handle
        S.pages[S.pages.length - 1]._page = page;
        render();
      }
      log(`Loaded ${f.name} — ${doc.numPages} page(s).`);
    }
  } catch (e) {
    log('PDF load failed: ' + (e.message || e), 'err');
  } finally {
    S.loading = false; render();
  }
}
async function renderPageImage(p, width, q) {
  const page = p._page;
  const vp1 = page.getViewport({ scale: 1 });
  const vp = page.getViewport({ scale: width / vp1.width });
  const cv = document.createElement('canvas');
  cv.width = Math.round(vp.width); cv.height = Math.round(vp.height);
  await page.render({ canvasContext: cv.getContext('2d'), viewport: vp }).promise;
  return cv;
}

// ── Tiling — THE fix for illegible sheets ────────────────────────────────────
// Vision models downscale every image to ~1.5k px on the long edge, so a whole
// 36"×24" sheet can never carry legible room tags or dimensions. Each sheet is
// sent as an OVERVIEW (for layout + marks) plus a grid of HIGH-RES TILES
// (default 3×3 with overlap → ~2.5× effective zoom), each tile at the model's
// resolution sweet spot.
const OVERVIEW_W = 1100;
const TILE_LONG = 1500;
async function tileImagesFor(p, grid) {
  const g = grid || 3;
  const overlap = 0.08;
  const srcW = Math.min(4400, Math.round(TILE_LONG * g / (1 + 2 * overlap)));
  const cv = await renderPageImage(p, srcW);
  const imgs = [];
  const ov = document.createElement('canvas');
  const os = OVERVIEW_W / cv.width;
  ov.width = OVERVIEW_W; ov.height = Math.round(cv.height * os);
  ov.getContext('2d').drawImage(cv, 0, 0, ov.width, ov.height);
  imgs.push({ label: 'FULL PAGE overview — marks reference THIS image', url: ov.toDataURL('image/jpeg', 0.78) });
  const stepX = cv.width / g, stepY = cv.height / g;
  const padX = stepX * overlap, padY = stepY * overlap;
  const rowName = ['TOP', 'MIDDLE', 'BOTTOM'], colName = ['LEFT', 'CENTER', 'RIGHT'];
  for (let r = 0; r < g; r++) for (let c = 0; c < g; c++) {
    const x0 = Math.max(0, c * stepX - padX), y0 = Math.max(0, r * stepY - padY);
    const x1 = Math.min(cv.width, (c + 1) * stepX + padX), y1 = Math.min(cv.height, (r + 1) * stepY + padY);
    const w = x1 - x0, h = y1 - y0;
    const scale = Math.min(1, TILE_LONG / Math.max(w, h));
    const t = document.createElement('canvas');
    t.width = Math.round(w * scale); t.height = Math.round(h * scale);
    t.getContext('2d').drawImage(cv, x0, y0, w, h, 0, 0, t.width, t.height);
    const nm = g === 3 ? `${rowName[r]}-${colName[c]}` : `r${r + 1}c${c + 1}`;
    imgs.push({ label: `${nm} zoom tile of the SAME page`, url: t.toDataURL('image/jpeg', 0.8) });
  }
  return imgs;
}
// ============================================================
// DETERMINISTIC ENGINE — zero AI, zero tokens. Architectural PDFs are
// VECTOR files: every wall line (with its legend color) and every text
// ("BATH 106", "8'-0\"", "1/4\" = 1'-0\"") exists inside the PDF with
// exact coordinates. We read them directly:
//   · text layer  → rooms, scale, sheet titles, printed dims
//   · operator list → stroked line segments + their stroke color
//   · scale → EXACT lengths in feet (1/4"=1'-0" ⇒ 18 pt per foot)
// This is the Bluebeam-style core: measure by geometry, not by vision.
// ============================================================

// ── Text layer ────────────────────────────────────────────────────────────────
async function engineText(p) {
  if (p._text) return p._text;
  const tc = await p._page.getTextContent();
  const view = p._page.view; // [x0,y0,x1,y1] in PDF points
  const items = tc.items.map(it => ({
    str: it.str,
    x: it.transform[4], y: it.transform[5],
    h: Math.hypot(it.transform[1], it.transform[3]) || 8,
    w: it.width || 0,
  })).filter(it => it.str && it.str.trim());
  p._text = { items, pageW: view[2] - view[0], pageH: view[3] - view[1] };
  return p._text;
}

// Scale: find "X" = 1'-0"" notations → points per foot. 72 pt = 1 inch paper.
// pdf.js splits text into fragments and plan sets use typographic primes
// (′ ″ ” ’), so we JOIN items into visual lines and normalize the quotes
// BEFORE matching — per-fragment matching is why v0.3 found no scale.
function normQuotes(s) { return String(s).replace(/[′’´`]/g, "'").replace(/[″“”]/g, '"'); }
function engineLines(text) {
  const items = text.items.slice().sort((a, b) => (b.y - a.y) || (a.x - b.x));
  const lines = [];
  let cur = null;
  for (const it of items) {
    if (cur && Math.abs(it.y - cur.y) < Math.max(3, it.h * 0.7)) { cur.str += ' ' + it.str; }
    else { cur = { y: it.y, str: it.str }; lines.push(cur); }
  }
  return lines.map(l => normQuotes(l.str));
}
function engineScale(text) {
  const counts = {};
  const re = /(\d+\s*\/\s*\d+|\d+(?:\.\d+)?)\s*"?\s*=\s*1\s*'\s*-?\s*0/g;
  for (const line of engineLines(text)) {
    let m;
    while ((m = re.exec(line)) !== null) {
      let inches;
      if (m[1].includes('/')) { const [a, b] = m[1].split('/').map(s => parseFloat(s)); inches = b ? a / b : 0; }
      else inches = parseFloat(m[1]);
      if (!inches || inches <= 0 || inches > 12) continue;
      const key = String(inches);
      counts[key] = (counts[key] || 0) + 1;
    }
  }
  const best = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
  return best ? { inches: parseFloat(best[0]) } : null;
}
// The math, auditable: at X" = 1'-0", X inches of paper = 1 foot real.
// 1 inch = 72 pt ⇒ ptPerFt = X × 72. For 1/4" scale: 0.25 × 72 = 18 pt/ft. ✓
function engineScaleFixed(text) {
  const s = engineScale(text);
  if (!s) return null;
  return { ptPerFt: s.inches * 72, inches: s.inches, auto: true };
}

// Rooms: "NAME + number" text pairs (e.g. "BATH" over "106") or single items.
function engineRooms(text) {
  const rooms = [];
  const items = text.items;
  for (let i = 0; i < items.length; i++) {
    const it = items[i];
    if (!/^[A-Z][A-Z /&.-]{2,24}$/.test(it.str.trim())) continue;
    if (/^(LEVEL|SCALE|NORTH|TRUE|NOTES?|LEGEND|TYPICAL|SEE|ALL|UNO|NO)$/.test(it.str.trim())) continue;
    // number just below (within ~2 line heights)?
    let num = '';
    for (let j = 0; j < items.length; j++) {
      const jt = items[j];
      if (!/^\d{3}[A-Z]?$/.test(jt.str.trim())) continue;
      if (Math.abs(jt.x - it.x) < 40 && (it.y - jt.y) > 0 && (it.y - jt.y) < it.h * 3.2) { num = jt.str.trim(); break; }
    }
    rooms.push({ name: it.str.trim() + (num ? ' ' + num : ''), x: it.x + (it.w || 0) / 2, y: it.y });
  }
  return rooms;
}

// Sheet title / level from the title-block zone (right 15% of the page).
// Level = the MOST FREQUENT "LEVEL n" (title-zone hits count ×3) — one stray
// "OUTLINE OF LEVEL 2 ABOVE" note can no longer hijack the page's level.
function engineTitleInfo(text) {
  let sheet = '';
  const votes = {};
  const tally = (s, w) => {
    let m; const re = /LEVEL\s*([0-9]+)/gi;
    while ((m = re.exec(s)) !== null) votes['LEVEL ' + m[1]] = (votes['LEVEL ' + m[1]] || 0) + w;
  };
  for (const it of text.items) {
    const s = it.str.trim();
    const inZone = it.x > text.pageW * 0.84;
    if (!sheet && inZone && /^[A-Z]{1,2}\d\.\d{1,2}$/.test(s)) sheet = s;
    tally(s, inZone ? 3 : 1);
  }
  const best = Object.entries(votes).sort((a, b) => b[1] - a[1])[0];
  return { sheet, level: best ? best[0] : '' };
}

// Viewport captions ("ASSEMBLY DIAGRAM - LEVEL 0 - RCP · 1/4" = 1'-0"") sit
// UNDER their view, so each segment belongs to the nearest caption below it.
// RCP / reflected-ceiling views repeat the same floor plate — counting both
// is the ~2× walls bug; they are excluded from wall lengths.
function engineViewports(text) {
  const items = text.items.slice().sort((a, b) => (b.y - a.y) || (a.x - b.x));
  const lines = [];
  let cur = null;
  for (const it of items) {
    if (cur && Math.abs(it.y - cur.y) < Math.max(3, it.h * 0.7)) cur.str += ' ' + it.str;
    else { cur = { y: it.y, str: it.str }; lines.push(cur); }
  }
  const vps = [];
  for (const ln of lines) {
    const s = normQuotes(ln.str);
    if (!/(DIAGRAM|PLAN)\b/i.test(s) || !/=\s*1\s*'/.test(s)) continue; // a title WITH its own scale = a real viewport caption
    const m = s.match(/LEVEL\s*([0-9]+)/i);
    vps.push({ y: ln.y, level: m ? 'LEVEL ' + m[1] : '', rcp: /\bRCP\b|REFLECTED/i.test(s) });
  }
  return vps.sort((a, b) => a.y - b.y);
}

// ── Vector layer: stroked segments with color ────────────────────────────────
function _mul(a, b) { return [a[0] * b[0] + a[2] * b[1], a[1] * b[0] + a[3] * b[1], a[0] * b[2] + a[2] * b[3], a[1] * b[2] + a[3] * b[3], a[0] * b[4] + a[2] * b[5] + a[4], a[1] * b[4] + a[3] * b[5] + a[5]]; }
function _pt(m, x, y) { return [m[0] * x + m[2] * y + m[4], m[1] * x + m[3] * y + m[5]]; }
function _colKey(rgb) { return rgb.map(v => Math.round(v / 24) * 24).join(','); }
function _isGrayish(rgb) { const [r, g, b] = rgb; const mx = Math.max(r, g, b), mn = Math.min(r, g, b); return (mx - mn) < 28; }

async function engineVectors(p) {
  if (p._segs) return p._segs;
  const OPS = pdfjsLib.OPS;
  const ol = await p._page.getOperatorList();
  const segs = [];
  let ctm = [1, 0, 0, 1, 0, 0], stroke = [0, 0, 0];
  const stack = [];
  let pending = [];
  const norm = (v) => (v <= 1.001 && v >= 0) ? Math.round(v * 255) : Math.round(v);
  for (let i = 0; i < ol.fnArray.length; i++) {
    const fn = ol.fnArray[i], args = ol.argsArray[i];
    if (fn === OPS.save) { stack.push({ ctm: ctm.slice(), stroke: stroke.slice() }); }
    else if (fn === OPS.restore) { const s = stack.pop(); if (s) { ctm = s.ctm; stroke = s.stroke; } }
    else if (fn === OPS.transform) { ctm = _mul(ctm, args); }
    else if (fn === OPS.setStrokeRGBColor) { stroke = [norm(args[0]), norm(args[1]), norm(args[2])]; }
    else if (fn === OPS.setStrokeGray) { const g = norm(args[0]); stroke = [g, g, g]; }
    else if (fn === OPS.setStrokeCMYKColor) { const [c, m, y, k] = args; stroke = [Math.round(255 * (1 - Math.min(1, c + k))), Math.round(255 * (1 - Math.min(1, m + k))), Math.round(255 * (1 - Math.min(1, y + k)))]; }
    else if (fn === OPS.constructPath) {
      const ops = args[0], co = args[1];
      let ci = 0, cur = null, start = null;
      for (const op of ops) {
        if (op === OPS.moveTo) { cur = _pt(ctm, co[ci], co[ci + 1]); start = cur; ci += 2; }
        else if (op === OPS.lineTo) { const nx = _pt(ctm, co[ci], co[ci + 1]); if (cur) pending.push([cur[0], cur[1], nx[0], nx[1]]); cur = nx; ci += 2; }
        else if (op === OPS.curveTo) { const nx = _pt(ctm, co[ci + 4], co[ci + 5]); if (cur) pending.push([cur[0], cur[1], nx[0], nx[1]]); cur = nx; ci += 6; }
        else if (op === OPS.curveTo2 || op === OPS.curveTo3) { const nx = _pt(ctm, co[ci + 2], co[ci + 3]); if (cur) pending.push([cur[0], cur[1], nx[0], nx[1]]); cur = nx; ci += 4; }
        else if (op === OPS.closePath) { if (cur && start) pending.push([cur[0], cur[1], start[0], start[1]]); cur = start; }
        else if (op === OPS.rectangle) {
          const x = co[ci], y = co[ci + 1], w = co[ci + 2], h = co[ci + 3];
          const p1 = _pt(ctm, x, y), p2 = _pt(ctm, x + w, y), p3 = _pt(ctm, x + w, y + h), p4 = _pt(ctm, x, y + h);
          pending.push([p1[0], p1[1], p2[0], p2[1]], [p2[0], p2[1], p3[0], p3[1]], [p3[0], p3[1], p4[0], p4[1]], [p4[0], p4[1], p1[0], p1[1]]);
          ci += 4;
        }
      }
    }
    else if (fn === OPS.stroke || fn === OPS.closeStroke || fn === OPS.fillStroke || fn === OPS.eoFillStroke || fn === OPS.closeFillStroke) {
      for (const s of pending) {
        const len = Math.hypot(s[2] - s[0], s[3] - s[1]);
        if (len > 0.5) segs.push({ x1: s[0], y1: s[1], x2: s[2], y2: s[3], len, rgb: stroke.slice(), key: _colKey(stroke) });
      }
      pending = [];
    }
    else if (fn === OPS.fill || fn === OPS.eoFill || fn === OPS.endPath) { pending = []; }
  }
  // Dedupe identical segments (re-stroked overlays, repeated legend swatches):
  // same endpoints + same color counted once.
  const seen = new Set(); const uniq = [];
  for (const s of segs) {
    const a = Math.round(s.x1) + ',' + Math.round(s.y1), b = Math.round(s.x2) + ',' + Math.round(s.y2);
    const k = (a < b ? a + '|' + b : b + '|' + a) + '|' + s.key;
    if (seen.has(k)) continue;
    seen.add(k); uniq.push(s);
  }
  p._segs = uniq;
  return uniq;
}

// Analyze one page: scale + rooms + title + colored line families.
async function engineAnalyze(idx) {
  const p = S.pages[idx]; if (!p) return null;
  if (p._eng && p._eng.v === 5) return p._eng;             // versioned — a re-Analyze picks up new engine logic
  const text = await engineText(p);
  const scale = engineScaleFixed(text);
  const rooms = engineRooms(text);
  const title = engineTitleInfo(text);
  const viewports = engineViewports(text);
  const segs = await engineVectors(p);
  const fams = {};
  for (const s of segs) {
    if (_isGrayish(s.rgb)) continue;                       // linework/dims — not legend colors
    if ((s.x1 + s.x2) / 2 > text.pageW * 0.84) continue;   // title block + legend swatches — never plan geometry
    const ftLen = scale ? s.len / scale.ptPerFt : 0;
    if (scale && (ftLen < 0.8 || ftLen > 200)) continue;   // hatch ticks / border frames
    if (!fams[s.key]) fams[s.key] = { key: s.key, rgb: s.rgb, css: `rgb(${s.rgb.join(',')})`, count: 0, pt: 0, segs: [] };
    fams[s.key].count++; fams[s.key].pt += s.len; fams[s.key].segs.push(s);
  }
  const families = Object.values(fams).sort((a, b) => b.pt - a.pt).slice(0, 12);
  p._eng = { v: 5, text, scale, rooms, title, viewports, families, pageW: text.pageW, pageH: text.pageH };
  return p._eng;
}

// Title-block strip (right edge, where sheet number + title + level live) at
// readable zoom — used by the classifier.
async function titleStripFor(p) {
  const cv = await renderPageImage(p, 3000);
  const sw = Math.round(cv.width * 0.26);
  const strip = document.createElement('canvas');
  const scale = Math.min(1, TILE_LONG / cv.height);
  strip.width = Math.round(sw * scale); strip.height = Math.round(cv.height * scale);
  strip.getContext('2d').drawImage(cv, cv.width - sw, 0, sw, cv.height, 0, 0, strip.width, strip.height);
  return strip.toDataURL('image/jpeg', 0.8);
}

// ── AUTO TAKE-OFF (0 tokens) — walls by legend color ─────────────────────────
// Analyze the selected pages' vectors, group colored line families across
// pages, let the user name each color (Plaster, Gypsum…) and set the level
// heights → EXACT rows: sum of real segment lengths × height, grouped by the
// nearest room label. Marks come from real geometry, so they land perfectly.
function guessMat(rgb) {
  const [r, g, b] = rgb;
  if (b > 140 && r < 110 && g < 160) return 'Plaster';
  if (g > 140 && b > 140 && r < 120) return 'Gypsum Board';
  if (r > 150 && g < 110 && b < 110) return 'Stone';
  if (r > 110 && b > 150 && g < 120) return 'Tile';
  if (g > 130 && r < 120 && b < 120) return 'Wood';
  if (r > 170 && g > 110 && b < 90) return 'Metal';
  return '';
}
function autoPages() {
  const checked = S.pages.map((p, i) => ({ p, i })).filter(x => x.p.use === true);
  if (checked.length) return checked.map(x => x.i);
  return S.pages.map((_, i) => i);
}
async function autoAnalyze() {

  try {

    for (const idx of idxs) {
      if (S.cancel) break;

      if (!eng) continue;
      info.push({ idx, sheet: eng.title.sheet || ('p.' + S.pages[idx].num), level: eng.title.level, scale: eng.scale, rooms: eng.rooms.length, famN: eng.families.length, vps: eng.viewports.length, rcp: eng.viewports.filter(v => v.rcp).length });
      for (const f of eng.families) {
        if (!fams[f.key]) fams[f.key] = { key: f.key, rgb: f.rgb, css: f.css, pt: 0, count: 0, byPage: {}, mat: guessMat(f.rgb), use: true };
        fams[f.key].pt += f.pt; fams[f.key].count += f.count;
        fams[f.key].byPage[idx] = f;
      }
      log(`Engine — ${eng.title.sheet || 'p.' + S.pages[idx].num}: ${eng.scale ? 'scale ' + eng.scale.inches + '"=1\'-0" ✓' : '⚠ no scale text found'} · ${eng.families.length} color famil${eng.families.length === 1 ? 'y' : 'ies'} · ${eng.rooms.length} room label(s)`);
    }
    const levels = [...new Set(info.map(x => x.level).filter(Boolean))];
    if (!S.autoHt) S.autoHt = {};
    for (const lv of levels) if (!S.autoHt[lv]) S.autoHt[lv] = 8;
    S.auto = { idxs, fams: Object.values(fams).sort((a, b) => b.pt - a.pt), info, levels };
    log(`Engine done — ${S.auto.fams.length} color families across ${idxs.length} page(s). Name the materials and generate.`, 'ok');
  } catch (e) {

}
async function autoGenerate() {

    const a = S.auto; if (!a) { alert('Run ⚙ Analyze vectors first.'); return; }
    const useFams = a.fams.filter(f => f.use && (f.mat || '').trim());
    if (!useFams.length) { alert('Name at least one color family (material) first.'); return; }
    const rows = [];
    let rcpSkipped = 0;
    const N1 = (v) => Math.round(v * 10) / 10; // 0.1‰ precision keeps localStorage small
    for (const idx of a.idxs) {
      const eng = S.pages[idx]._eng; if (!eng) continue;
      const ppf = pagePtPerFt(idx);                              // calib > sheet text > manual dropdown
      if (!ppf) continue;
      const override = (S.pages[idx]._levelOverride != null && S.pages[idx]._levelOverride !== '') ? S.pages[idx]._levelOverride : '';
      const pageLevel = override || eng.title.level || '';
      const vps = eng.viewports || [];
      // caption sits UNDER its view → a segment's viewport = last caption at or below it
      const vpFor = (my) => { if (!vps.length) return null; let best = null; for (const v of vps) if (v.y <= my) best = v; return best || vps[0]; };
      for (const f of useFams) {
        const pf = f.byPage[idx]; if (!pf) continue;
        // group this color's segments by level (per viewport) + nearest room label
        const groups = {};
        const TH = 45 * ppf; // a room label further than ~45 ft away is another room

          const ftLen = s.len / ppf;
          if (ftLen < 0.8 || ftLen > 200) continue;              // hatch ticks / border frames (re-applied with the EFFECTIVE scale)
          const mx = (s.x1 + s.x2) / 2, my = (s.y1 + s.y2) / 2;
          const vp = vpFor(my);
          if (vp && vp.rcp) { rcpSkipped++; continue; }          // RCP repeats the same plate — counting it doubles the walls
          const level = override || (vp && vp.level) || pageLevel;
          let best = null, bd = Infinity;
          for (const r of eng.rooms) { const d = Math.hypot(r.x - mx, r.y - my); if (d < bd) { bd = d; best = r; } }
          const room = (best && bd < TH) ? best.name : '(unassigned)';
          const gk = level + '║' + room;
          if (!groups[gk]) groups[gk] = { ft: 0, segs: [], level, room };
          groups[gk].ft += ftLen;
          groups[gk].segs.push(s);
        }
        for (const g of Object.values(groups)) {
          if (g.ft < 1) continue;
          const ht = (g.level && S.autoHt && Number(S.autoHt[g.level]) > 0) ? Number(S.autoHt[g.level]) : (Number(S.autoHtDef) > 0 ? Number(S.autoHtDef) : null);
          // marks = the REAL segments (normalized 0-1000, y flipped) → the marked
          // page paints the same lines a hand highlighter would
          const marks = g.segs.slice().sort((x, y) => y.len - x.len).slice(0, 120).map(s => ({
            page: idx,

            x2: N1(s.x2 / eng.pageW * 1000), y2: N1((eng.pageH - s.y2) / eng.pageH * 1000),
          }));
          rows.push({
            cat: 'WALLS', level: g.level, space: g.room === '(unassigned)' ? '' : g.room,
            material: f.mat.trim(), dims: Math.round(g.ft * 100) / 100,
            height: ht, unit: 'SF', est: false,
            note: 'engine: ' + g.segs.length + ' segment(s)', src: (eng.title.sheet || 'p.' + S.pages[idx].num) + ' · vector', marks,
          });
        }

    }
    if (!rows.length) { alert('No rows produced — check that the pages have a readable scale (or pick one in the Scale dropdown) and colored assembly lines.'); return; }
    S.takeoff = {
      id: 'to_' + Date.now(), ts: new Date().toISOString(), preset: 'walls',
      label: 'Engine · Walls by color · ' + (S.projectName || 'plans') + ' · ' + new Date().toLocaleDateString(),
      rows, missing: [], notes: 'Deterministic vector measurement — 0 AI tokens. Lengths are exact path geometry × printed scale; verify color→material naming and heights.' + (rcpSkipped ? ' RCP/reflected viewports were excluded (duplicate views of the same plate).' : ''),
      issues: [],
    };
    S.saved.push(S.takeoff); persist();
    S.sheetOpen = true;
    log(`Engine take-off — ${rows.length} rows${rcpSkipped ? ' · RCP view(s) excluded (' + rcpSkipped + ' duplicate segments)' : ''} · 0 tokens.`, 'ok');
    render();
    setTimeout(() => { const el = document.getElementById('to-sheet'); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 60);

}

// ── AI plumbing (ask-ai SSE) ──────────────────────────────────────────────────
// CRITICAL CONTRACT: ask-ai expects planImages as OBJECTS {name, pageNum,
// base64} — a plain dataURL string is silently DROPPED by the function (the
// model then sees "N pages attached" in its prompt but no actual images, and
// fabricates). Every image goes through normImgs() so that can never happen.
function normImgs(images) {
  return (images || []).slice(0, MAX_IMAGES).map((im, i) => ({
    discipline: 'PLAN',
    name: (typeof im === 'string' ? ('image ' + (i + 1)) : (im.label || ('image ' + (i + 1)))).slice(0, 90),
    pageNum: i + 1,
    base64: typeof im === 'string' ? im : im.url,
  })).filter(x => typeof x.base64 === 'string' && x.base64.startsWith('data:image/'));
}
async function aiCall(prompt, images) {
  const body = {
    projectContext: { name: S.projectName || 'Take-off Lab', isSub: false },
    messages: [{ role: 'user', content: prompt }],
  };
  const imgs = normImgs(images);
  if (imgs.length) body.planImages = imgs;
  const res = await fetch(`${SUPABASE_URL}/functions/v1/ask-ai`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buffer = '', full = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += dec.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop() ?? '';
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      let evt; try { evt = JSON.parse(line.slice(6)); } catch { continue; }
      if (evt.type === 'delta') full += evt.text;
      else if (evt.type === 'error') throw new Error(evt.message || 'AI error');
    }
  }
  return full;
}
function parseAIJson(text) {
  if (!text) return null;
  let t = String(text).trim();
  const fence = t.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fence) t = fence[1].trim();
  const start = t.search(/[{[]/);
  if (start > 0) t = t.slice(start);
  for (let end = t.length; end > 0; end--) {
    const c = t[end - 1];
    if (c !== '}' && c !== ']') continue;
    try { return JSON.parse(t.slice(0, end)); } catch (_e) { /* keep trimming */ }
  }
  return null;
}

// ── Marked pages (the highlighted-PDF look) ──────────────────────────────────
function marksByPage() {
  const map = {};
  if (!S.takeoff) return map;
  S.takeoff.rows.forEach((r, ri) => {
    for (const mk of (r.marks || [])) {
      if (!map[mk.page]) map[mk.page] = [];

    }

}
async function baseMarkedCanvas(idx) {
  const p = S.pages[idx]; if (!p) return null;
  const marks = marksByPage()[idx] || [];
  const key = idx + '|' + marks.length + '|' + (S.takeoff ? S.takeoff.id : '');
  if (S._cvCache && S._cvCache.key === key) return S._cvCache.cv;
  const cv = await renderPageImage(p, FULL_W, 0.85);
  const ctx = cv.getContext('2d');
  const X = (v) => v / 1000 * cv.width, Y = (v) => v / 1000 * cv.height;
  // 1 · shapes — engine rows carry real segments (highlighter strokes);
  //     AI / manual rows carry rects
  for (const mk of marks) {
    const col = matColor(mk.material);
    ctx.save();
    if (mk.x1 != null) {
      ctx.globalAlpha = 0.45; ctx.strokeStyle = col; ctx.lineCap = 'round';
      ctx.lineWidth = Math.max(4, cv.width * 0.004);
      ctx.beginPath(); ctx.moveTo(X(mk.x1), Y(mk.y1)); ctx.lineTo(X(mk.x2), Y(mk.y2)); ctx.stroke();
    } else {
      ctx.globalAlpha = 0.22; ctx.fillStyle = col; ctx.fillRect(X(mk.x), Y(mk.y), X(mk.w), Y(mk.h));
      ctx.globalAlpha = 1; ctx.lineWidth = 2.5; ctx.strokeStyle = col; ctx.strokeRect(X(mk.x), Y(mk.y), X(mk.w), Y(mk.h));
    }
    ctx.restore();
  }
  // 2 · labels — ONE per row (anchored at its longest mark), nudged down
  //     until it stops overlapping labels already placed
  const firstByRow = {};
  for (const mk of marks) if (firstByRow[mk.ri] === undefined) firstByRow[mk.ri] = mk;
  const placed = [];
  ctx.font = '700 15px Consolas, monospace';
  for (const mk of Object.values(firstByRow)) {
    const col = matColor(mk.material);
    const ax = mk.x1 != null ? Math.min(X(mk.x1), X(mk.x2)) : X(mk.x);
    const ay = mk.x1 != null ? Math.min(Y(mk.y1), Y(mk.y2)) : Y(mk.y);
    const tw = ctx.measureText(mk.label).width + 12;
    const lx = Math.min(Math.max(2, ax), cv.width - tw - 2);
    let ly = Math.max(2, ay - 22), guard = 0;
    while (placed.some(b => lx < b.x + b.w && lx + tw > b.x && ly < b.y + 20 && ly + 20 > b.y) && guard++ < 40) ly += 22;
    placed.push({ x: lx, y: ly, w: tw });
    ctx.save();
    ctx.fillStyle = col; ctx.fillRect(lx, ly, tw, 20);
    ctx.fillStyle = '#fff'; ctx.fillText(mk.label, lx + 6, ly + 15);
    ctx.restore();
  }
  S._cvCache = { key, cv };
  return cv;
}
async function drawMarkedPage(idx) {

  const cv = document.createElement('canvas');
  cv.width = base.width; cv.height = base.height;

// ── Bluebeam-style manual tools (measure · area · count · calibrate) ─────────
// Clicks land in PDF coordinates via the page dims; lengths/areas use the
// page's detected scale (or a 2-click calibration on a printed dimension).
function pagePtPerFt(idx) {
  const p = S.pages[idx]; if (!p) return null;
  if (p._calibPtPerFt) return p._calibPtPerFt;                 // 2-click calibration wins
  if (p._eng && p._eng.scale) return p._eng.scale.ptPerFt;     // scale text read off the sheet
  if (S.manualScaleIn) return S.manualScaleIn * 72;            // user-annotated scale (dropdown)
  return null;
}
function toolValue(idx) {
  const t = S.tool; if (!t || !t.pts.length) return '';
  const ppf = pagePtPerFt(idx);
  if (t.mode === 'count') return t.pts.length + ' EA';
  if (!ppf) return '⚠ no scale — calibrate first';
  if (t.mode === 'measure') {
    let ft = 0;
    for (let i = 1; i < t.pts.length; i++) ft += Math.hypot(t.pts[i][0] - t.pts[i - 1][0], t.pts[i][1] - t.pts[i - 1][1]) / ppf;
    return fmtNum(ft) + ' LF';
  }
  if (t.mode === 'area' && t.pts.length >= 3) {
    let a = 0;
    for (let i = 0; i < t.pts.length; i++) { const [x1, y1] = t.pts[i], [x2, y2] = t.pts[(i + 1) % t.pts.length]; a += x1 * y2 - x2 * y1; }
    return fmtNum(Math.abs(a / 2) / (ppf * ppf)) + ' SF';
  }
  if (t.mode === 'calib' && t.pts.length === 2) return 'now enter the real length →';
  return t.pts.length + ' pt(s)';
}
function toolStart(mode) {
  S.tool = { mode, pts: [] };
  render();
}
function toolClick(e, idx) {
  const t = S.tool; if (!t || !t.mode) return;
  const p = S.pages[idx]; const eng = p._eng;
  const pageW = eng ? eng.pageW : (p._page.view[2] - p._page.view[0]);
  const pageH = eng ? eng.pageH : (p._page.view[3] - p._page.view[1]);
  const r = e.target.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width * pageW;
  const y = pageH * (1 - (e.clientY - r.top) / r.height);

  t.pts.push([x, y]);
  if (t.mode === 'calib' && t.pts.length === 2) {
    const distPt = Math.hypot(t.pts[1][0] - t.pts[0][0], t.pts[1][1] - t.pts[0][1]);
    const ftStr = prompt('Real length of what you just clicked (in feet, e.g. 10 or 27.87):');
    const ft = parseFloat(ftStr);
    if (ft && ft > 0) {
      S.pages[idx]._calibPtPerFt = distPt / ft;
      log(`Calibrated ${((S.pages[idx].cls || {}).sheet) || 'p.' + S.pages[idx].num}: ${fmtNum(distPt / ft)} pt/ft.`, 'ok');
    }
    t.pts = [];
  }
  paintViewer();
}
function toolAddRow(idx) {

  const space = document.getElementById('tool-space')?.value?.trim() || '';

  const mark = {
    page: idx,
    x: Math.min(...xs) / pageW * 1000 - 4, y: (pageH - Math.max(...ys)) / pageH * 1000 - 4,
    w: Math.max(8, (Math.max(...xs) - Math.min(...xs)) / pageW * 1000 + 8), h: Math.max(8, (Math.max(...ys) - Math.min(...ys)) / pageH * 1000 + 8),
  };

function drawToolOverlay(ctx, cv, idx) {
  const t = S.tool; if (!t || !t.pts.length) return;
  const p = S.pages[idx]; const eng = p._eng;
  const pageW = eng ? eng.pageW : (p._page.view[2] - p._page.view[0]);
  const pageH = eng ? eng.pageH : (p._page.view[3] - p._page.view[1]);

        <div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:3px">${t.rows.length} rows${estCount ? ` · <span style="color:var(--amber)">${estCount} marked ~ estimated from scale — verify</span>` : ''} · every cell editable, totals live</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-sm" ${S.verifying ? 'disabled' : ''} onclick="agentVerify()">${S.verifying ? '<span class="spin"></span> Checking…' : '✓ Agent 3 · Check it'}</button>
        <button class="btn btn-sm" onclick="exportCSV()">⬇ Excel / CSV</button>
        <button class="btn btn-sm" onclick="downloadAllMarked()">⬇ Marked pages</button>
        <button class="btn btn-sm btn-red" onclick="deleteSaved('${t.id}')">Delete</button>
      </div>
    </div>
    ${t.notes ? `<div style="font-family:var(--mono);font-size:10.5px;color:var(--text2);margin-top:8px">${esc(t.notes)}</div>` : ''}
    <div style="margin-top:12px;max-height:44vh;overflow:auto;border:1px solid var(--border)">
      <table class="sheet"><thead><tr>${['Cat', 'Level', 'Space', 'Material', 'Dims', 'Ht (ft)', 'Unit', 'Total', ''].map(h => `<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${t.rows.map((r, idx) => `<tr>
        <td title="${esc(r.src ? 'Measured on ' + r.src : '')}" style="font-family:var(--mono);font-size:9.5px;color:var(--text3);cursor:${r.src ? 'help' : 'default'}">${esc(r.cat)}</td>
        <td>${inp(idx, 'level', r.level, '76px')}</td>
        <td>${inp(idx, 'space', r.space, '128px')}</td>
        <td><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${matColor(r.material)};margin-right:4px"></span>${inp(idx, 'material', r.material, '82px')}</td>
        <td>${inp(idx, 'dims', r.dims, '72px', true)}</td>
        <td>${r.unit === 'SF' ? inp(idx, 'height', r.height, '56px', true) : ''}</td>
        <td style="font-family:var(--mono);font-size:10px;color:var(--text3)">${esc(r.unit)}</td>
        <td style="text-align:right;font-family:var(--mono);font-size:11.5px;font-weight:700;color:var(--ink-900)">${r.est ? '<span title="Estimated from drawing scale — verify" style="color:var(--amber)">~</span> ' : ''}<span id="to-total-${idx}">${fmtNum(rowTotal(r))}</span></td>
        <td><button class="btn btn-sm btn-red" style="padding:2px 7px" onclick="delRow(${idx})">✕</button></td>
      </tr>`).join('')}</tbody></table>
    </div>
    <div style="margin-top:8px"><button class="btn btn-sm" onclick="addRow()">+ Add row</button></div>
    <div id="to-footer">${totalsHtml(t)}</div>
    ${t.missing.length ? `<div style="margin-top:10px;background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--r);padding:9px 12px">
      <div class="kicker" style="color:var(--amber);margin-bottom:4px">⚠ Missing / verify</div>
      ${t.missing.map(x => `<div style="font-size:12px;line-height:1.5">• ${esc(x)}</div>`).join('')}
    </div>` : ''}
    ${(t.issues || []).length ? `<div style="margin-top:10px;background:var(--red-bg);border:1px solid var(--red-border);border-radius:var(--r);padding:9px 12px">
      <div class="kicker" style="color:var(--red);margin-bottom:4px">Agent 3 · Checker findings</div>
      ${t.issues.map(x => `<div style="font-size:12px;line-height:1.5">• ${esc(x)}</div>`).join('')}
    </div>` : ''}
  </div>`;
}

function render() {
  const clsChip = (c) => {
    if (!c) return '';
    const colors = { assembly_plan: 'var(--amber)', rcp: '#2563eb', finish_plan: '#15803d', finish_spec: '#7c3aed', elevations: '#c2410c', floor_plan: 'var(--ink-700)', sections: '#0f766e', schedule: '#be185d' };
    return `<span class="chip" style="border-color:${colors[c.type] || 'var(--border)'};color:${colors[c.type] || 'var(--text2)'}">${esc(c.sheet || c.type)}</span>`;
  };
  const marks = marksByPage();
  document.getElementById('app').innerHTML = `
  <div style="max-width:1280px;margin:0 auto;padding:22px 24px 60px">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:14px;border-bottom:2px solid var(--ink-950);padding-bottom:14px;flex-wrap:wrap">
      <div>
        <div class="kicker">[ NOVANTU LABS · EXPERIMENTAL ]</div>
        <h1 style="font-size:30px;font-weight:700;letter-spacing:-.02em;color:var(--ink-900);margin-top:2px">Take-off Lab</h1>
        <div style="font-size:13px;color:var(--text2);margin-top:4px;max-width:640px;line-height:1.5">Upload a plan set → three AI agents classify the sheets, quantify what you pick, and check the numbers. You get the editable sheet (→ Excel) and the plans <b>marked by material with SF labels</b>, like a hand-highlighted take-off.</div>
      </div>
      <input class="minp" placeholder="Project name…" value="${esc(S.projectName)}" oninput="S.projectName=this.value" style="width:220px">
    </div>

    <div style="display:grid;grid-template-columns:300px 1fr;gap:16px;margin-top:16px;align-items:start">
      <!-- LEFT: pages -->
      <div>
        <div class="card">
          <div class="kicker" style="margin-bottom:8px">1 · Plan set ${S.pages.length ? `· ${S.pages.length} page(s)` : ''}</div>
          <label class="btn btn-ink" style="width:100%;justify-content:center">${S.loading ? '<span class="spin"></span> Loading…' : '⬆ Upload PDF(s)'}
            <input type="file" accept="application/pdf" multiple style="display:none" onchange="handleFiles(this.files)">
          </label>
          <div ondrop="event.preventDefault();handleFiles(event.dataTransfer.files)" ondragover="event.preventDefault()" style="margin-top:8px;border:1px dashed var(--rule);border-radius:var(--r2);padding:10px;text-align:center;font-family:var(--mono);font-size:9.5px;color:var(--text3)">…or drop the PDF here</div>
          ${S.pages.length ? `<button class="btn btn-sm" style="width:100%;justify-content:center;margin-top:8px" ${S.classifying ? 'disabled' : ''} onclick="agentClassify()">${S.classifying ? '<span class="spin"></span> Classifying…' : '✦ Agent 1 · Classify sheets'}</button>` : ''}
          ${S.pages.length ? `<div style="font-family:var(--mono);font-size:8.5px;color:var(--text3);margin-top:8px">☑ = include in the take-off (none ticked → auto by classification)</div>` : ''}
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;max-height:52vh;overflow-y:auto">
            ${S.pages.map((p, idx) => `<div style="border:1px solid ${marks[idx] ? matColor((marks[idx][0] || {}).material) : (p.use === true ? 'var(--amber)' : 'var(--border)')};border-radius:var(--r);overflow:hidden;background:#fff;position:relative">
              <img src="${p.thumb}" onclick="openViewer(${idx})" style="width:100%;display:block;cursor:pointer">
              ${marks[idx] ? `<span style="position:absolute;top:3px;right:3px;background:var(--amber);color:#fff;font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:7px">${marks[idx].length} ✎</span>` : ''}
              <div style="padding:3px 5px;display:flex;justify-content:space-between;align-items:center;gap:3px">
                <span style="font-family:var(--mono);font-size:8px;color:var(--text3)"><input type="checkbox" ${p.use === true ? 'checked' : ''} onchange="S.pages[${idx}].use=this.checked?true:undefined;render()" style="vertical-align:-2px;accent-color:var(--amber)"> p.${p.num}</span>${clsChip(p.cls)}
              </div>
            </div>`).join('')}
          </div>
        </div>
      </div>

      <!-- RIGHT: workflow -->
      <div>
        <div class="card" style="border-color:var(--green);border-width:1.5px">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px">
            <div class="kicker" style="color:var(--green)">2 · Automatic engine — vector geometry · <b>0 AI tokens</b></div>
            <button class="btn btn-sm" ${S.autoBusy || !S.pages.length ? 'disabled' : ''} onclick="autoAnalyze()">${S.autoBusy ? '<span class="spin"></span> Analyzing…' : '⚙ Analyze vectors'}</button>
          </div>
          <div style="font-size:12px;color:var(--text2);line-height:1.5">Reads the PDF's real geometry: colored assembly lines (exact lengths × scale), room labels and levels — like Bluebeam, but automatic. ☑ pages to limit it (e.g. only the assembly diagrams).</div>
          ${S.pages.length ? `<div style="display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap">
            <span class="kicker">Scale:</span>
            <select class="minp" onchange="S.manualScaleIn=parseFloat(this.value)||null;render()">
              ${[['', 'Auto — read from each sheet'], ['0.09375', '3/32″ = 1′-0″'], ['0.125', '1/8″ = 1′-0″'], ['0.1875', '3/16″ = 1′-0″'], ['0.25', '1/4″ = 1′-0″'], ['0.375', '3/8″ = 1′-0″'], ['0.5', '1/2″ = 1′-0″'], ['0.75', '3/4″ = 1′-0″'], ['1', '1″ = 1′-0″'], ['1.5', '1-1/2″ = 1′-0″'], ['3', '3″ = 1′-0″']].map(([v, l]) => `<option value="${v}"${String(S.manualScaleIn || '') === v ? ' selected' : ''}>${l}</option>`).join('')}
            </select>
            <span style="font-family:var(--mono);font-size:9.5px;color:var(--text3)">pick the drawing scale here — it fills in wherever the sheet has no readable scale text. No clicking, no measuring.</span>
          </div>` : ''}
          ${S.auto ? `
            <div style="margin-top:10px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden">
              ${S.auto.info.map(pg => {
                const ppf = pagePtPerFt(pg.idx);
                const lvl = (S.pages[pg.idx]._levelOverride != null) ? S.pages[pg.idx]._levelOverride : (pg.level || '');
                const src = S.pages[pg.idx]._calibPtPerFt ? 'calibrated ✓' : (S.pages[pg.idx]._eng && S.pages[pg.idx]._eng.scale ? S.pages[pg.idx]._eng.scale.inches + '″=1′-0″ ✓' : (S.manualScaleIn ? 'manual scale' : '⚠ no scale'));
                return `<div style="display:flex;align-items:center;gap:8px;padding:5px 10px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:10.5px;background:var(--bg1)">
                <b style="width:58px;color:var(--ink-900)">${esc(pg.sheet)}</b>
                <span style="color:var(--text3)">level</span>
                <input class="minp" value="${esc(lvl)}" placeholder="LEVEL ?" oninput="S.pages[${pg.idx}]._levelOverride=this.value" onchange="render()" style="width:88px;padding:3px 6px;font-size:10px">
                <span style="color:${ppf ? 'var(--green)' : 'var(--red)'};margin-left:auto">${src}</span>
                <span style="color:var(--text3)">${pg.rooms} rooms${pg.rcp ? ' · <b style="color:var(--green)">RCP view excluded</b>' : ''}</span>
              </div>`; }).join('')}
            </div>
            <div style="margin-top:8px;display:flex;flex-direction:column;gap:5px">
              ${S.auto.fams.map((f, fi) => {
                const lf = S.auto.info.reduce((acc, pg) => { const ppf = pagePtPerFt(pg.idx); return acc + ((f.byPage[pg.idx] && ppf) ? f.byPage[pg.idx].pt / ppf : 0); }, 0);
                return `<div style="display:flex;align-items:center;gap:8px;border:1px solid var(--border);padding:6px 10px;border-radius:var(--r)">
                <input type="checkbox" ${f.use ? 'checked' : ''} onchange="S.auto.fams[${fi}].use=this.checked" style="accent-color:var(--green)">
                <span style="width:16px;height:16px;border-radius:3px;background:${f.css};flex-shrink:0;border:1px solid var(--border)"></span>
                <input class="minp" placeholder="material name…" value="${esc(f.mat)}" oninput="S.auto.fams[${fi}].mat=this.value" style="width:170px">
                <span style="font-family:var(--mono);font-size:10.5px;color:var(--text2);margin-left:auto">${f.count} seg · ${lf ? fmtNum(lf) + ' LF' : fmtNum(f.pt) + ' pt'}</span>
              </div>`; }).join('')}
            </div>
            ${(() => {
              const lvls = [...new Set(S.auto.info.map(pg => (S.pages[pg.idx]._levelOverride != null && S.pages[pg.idx]._levelOverride !== '') ? S.pages[pg.idx]._levelOverride : pg.level).filter(Boolean))];
              if (!S.autoHt) S.autoHt = {};
              for (const lv of lvls) if (!S.autoHt[lv]) S.autoHt[lv] = 8;
              if (S.autoHtDef == null) S.autoHtDef = 8;
              return `<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;align-items:center">
              <span class="kicker">Wall heights (ft):</span>
              ${lvls.map(lv => `<label style="font-family:var(--mono);font-size:10.5px;color:var(--text2)">${esc(lv)} <input class="minp" type="number" step="0.5" value="${S.autoHt[lv]}" oninput="S.autoHt['${esc(lv)}']=Number(this.value)" style="width:56px;text-align:right"></label>`).join('')}
              <label style="font-family:var(--mono);font-size:10.5px;color:var(--text2)">Default <input class="minp" type="number" step="0.5" value="${S.autoHtDef}" oninput="S.autoHtDef=Number(this.value)" style="width:56px;text-align:right"></label>
            </div>`;
            })()}
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:8px;flex-wrap:wrap">
              <span style="font-family:var(--mono);font-size:9.5px;color:var(--text3)">${(() => { const n = S.auto.info.filter(x => !pagePtPerFt(x.idx)).length; return n ? '⚠ ' + n + ' page(s) without scale — pick a manual scale above' : 'scale resolved for every page ✓'; })()}</span>
              <button class="btn" style="background:var(--green);border-color:var(--green);color:#fff" onclick="autoGenerate()">▦ Generate take-off (0 tokens)</button>
            </div>` : ''}
        </div>

        ${S.sheetOpen && S.takeoff ? buildSheet() : ''}

        <div class="card" style="margin-top:14px">
          <div class="kicker" style="margin-bottom:10px">3 · AI assist (optional — scanned sets, tiles/plumbing, checking)</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px">
            ${Object.entries(PRESETS).map(([k, pr]) => `<div onclick="S.preset='${k}';render()" style="cursor:pointer;border:1px solid ${S.preset === k ? 'var(--amber)' : 'var(--border)'};background:${S.preset === k ? 'var(--amber-bg)' : 'var(--bg1)'};border-radius:var(--r2);padding:10px 12px">
              <div style="font-size:12.5px;font-weight:600;color:var(--ink-900)">${esc(pr.label)}</div>
              <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:3px;line-height:1.45">${esc(pr.sub)}</div>
            </div>`).join('')}
          </div>
          <div style="display:flex;gap:8px;margin-top:10px;align-items:flex-start;flex-wrap:wrap">
            <textarea id="to-guidance" rows="2" class="minp" placeholder="Guidance (optional) — e.g. only levels 2-3, plaster walls only, heights per RCP…" style="flex:1;min-width:260px;resize:vertical">${esc(S.guidance)}</textarea>
            <button class="btn btn-amber" ${S.extracting || !S.pages.length ? 'disabled' : ''} onclick="agentExtract()" title="${S.pages.length ? '' : 'Upload the plan set first'}">${S.extracting ? '<span class="spin"></span> Measuring sheet by sheet…' : '✦ Agent 2 · Run take-off'}</button>
            ${(S.extracting || S.classifying) ? `<button class="btn btn-red" onclick="S.cancel=true">■ Stop</button>` : ''}
          </div>
          ${S.pages.length && !S.pages.some(p => p.cls) ? '<div style="font-family:var(--mono);font-size:9.5px;color:var(--text3);margin-top:6px">Tip: run Agent 1 first — the extractor then measures ONLY the relevant sheets, one at a time, in high-res tiles (this is what makes the numbers real).</div>' : ''}
          ${S.pages.length ? `<div style="font-family:var(--mono);font-size:9.5px;color:var(--text3);margin-top:4px">Each sheet is sent as a zoomed 3×3 mosaic — a full run takes a few minutes. You can ■ Stop anytime and keep what's measured.</div>` : ''}
        </div>

        ${S.saved.length ? `<div class="card" style="margin-top:14px">
          <div class="kicker" style="margin-bottom:8px">Saved take-offs <span style="color:var(--text3)">(sheets persist here — page marks need the same PDF uploaded)</span></div>
          <div style="display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto">
            ${S.saved.slice().reverse().map(t => `<div style="display:flex;justify-content:space-between;gap:8px;border:1px solid var(--border);padding:7px 10px;font-size:12px;align-items:center">
              <span onclick="openSaved('${t.id}')" style="cursor:pointer;color:var(--ink-900)">${esc(t.label)}</span>
              <span style="display:flex;gap:6px;align-items:center"><span style="font-family:var(--mono);font-size:10px;color:var(--text3)">${t.rows.length} rows</span><button class="btn btn-sm btn-red" style="padding:2px 7px" onclick="deleteSaved('${t.id}')">✕</button></span>
            </div>`).join('')}
          </div>
        </div>` : ''}

        <div class="card" style="margin-top:14px">
          <div class="kicker" style="margin-bottom:6px">Agent run log</div>
          <div id="runlog" style="max-height:150px;overflow-y:auto;font-family:var(--mono);font-size:10.5px;line-height:1.7">
            ${S.runLog.length ? S.runLog.map(l => `<div style="color:${l.cls === 'err' ? 'var(--red)' : l.cls === 'ok' ? 'var(--green)' : l.cls === 'warn' ? 'var(--amber)' : 'var(--text2)'}">${l.ts} — ${esc(l.msg)}</div>`).join('') : '<span style="color:var(--text3)">Waiting for a plan set…</span>'}
          </div>
        </div>
      </div>
    </div>
    <div style="text-align:center;margin-top:26px;font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:var(--text3)">NOVANTU LABS · TAKE-OFF v0.5 — vector engine (0 tokens): viewport-aware (RCP views excluded) + highlighter-style marks · AI assist optional · always verify before bidding</div>
  </div>

  ${S.viewer ? `<div class="backdrop" onclick="if(event.target===this){S.viewer=null;render()}">
    <div class="modal" style="max-width:1060px" onclick="event.stopPropagation()">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
        <div>
          <div style="font-weight:700;color:var(--ink-900)">${esc(((S.pages[S.viewer.idx] || {}).cls || {}).sheet || 'Page ' + ((S.pages[S.viewer.idx] || {}).num || ''))} <span style="font-family:var(--mono);font-size:10px;color:var(--text3)">· ${(marksByPage()[S.viewer.idx] || []).length} mark(s)</span></div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-sm" ${S.viewer.idx <= 0 ? 'disabled' : ''} onclick="openViewer(${S.viewer.idx - 1})">← Prev</button>
          <button class="btn btn-sm" ${S.viewer.idx >= S.pages.length - 1 ? 'disabled' : ''} onclick="openViewer(${S.viewer.idx + 1})">Next →</button>
          <button class="btn btn-sm" onclick="downloadMarkedPage(${S.viewer.idx})">⬇ Download marked</button>
          <button class="btn btn-sm" onclick="S.tool=null;S.viewer=null;render()">✕ Close</button>
        </div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px;border:1px solid var(--border);border-radius:var(--r2);padding:6px 8px;background:var(--bg1)">
        <span class="kicker">Tools:</span>
        ${[['measure', '📏 Measure'], ['area', '⬠ Area'], ['count', '# Count'], ['calib', '⨯ Calibrate']].map(([m, lbl]) => `<button class="btn btn-sm" style="${S.tool && S.tool.mode === m ? 'background:var(--ink-950);color:#fff;border-color:var(--ink-950)' : ''}" onclick="toolStart('${m}')">${lbl}</button>`).join('')}
        ${S.tool && S.tool.mode ? `
          <span id="tool-readout" style="font-family:var(--mono);font-size:12px;font-weight:700;color:var(--red);min-width:80px">${toolValue(S.viewer.idx)}</span>
          <input id="tool-mat" class="minp" placeholder="material…" style="width:110px">
          <input id="tool-space" class="minp" placeholder="space/room…" style="width:110px">
          <button class="btn btn-sm" style="background:var(--green);border-color:var(--green);color:#fff" onclick="toolAddRow(${S.viewer.idx})">＋ Add as row</button>
          <button class="btn btn-sm" onclick="S.tool.pts=[];paintViewer()">Clear</button>
        ` : `<span style="font-family:var(--mono);font-size:9.5px;color:var(--text3)">scale: ${pagePtPerFt(S.viewer.idx) ? fmtNum(pagePtPerFt(S.viewer.idx)) + ' pt/ft ✓' : 'none — use ⨯ Calibrate on a printed dimension'}</span>`}
      </div>
      <div id="viewer-canvas" style="border:1px solid var(--border);background:#fff"></div>
    </div>
  </div>` : ''}`;
  if (S.viewer) setTimeout(paintViewer, 30); // re-render rebuilt the holder — repaint it
}
render();
</script>
</body>
</html>
